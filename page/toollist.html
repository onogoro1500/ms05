<!DOCTYPE html>
<html lang="ja" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オノゴロ | ツール一覧</title>
<style>
/* TOKENS */
:root {
  --red: #cc0000;
  --red-dim: rgba(204,0,0,0.12);
  --red-border: rgba(204,0,0,0.35);

  --bg: #ffffff;
  --bg-2: #f4f4f4;
  --bg-3: #ebebeb;
  --border: rgba(0,0,0,0.10);
  --border-strong: rgba(0,0,0,0.20);
  --text: #111111;
  --text-2: #444444;
  --text-3: #888888;

  --nav-h: 60px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --trans: 0.18s ease;
}

[data-theme="dark"] {
  --bg: #111111;
  --bg-2: #1c1c1c;
  --bg-3: #262626;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.18);
  --text: #f0f0f0;
  --text-2: #bbbbbb;
  --text-3: #666666;
}

/* RESET / BASE */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
  transition: background var(--trans), color var(--trans);
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }

/* NAV */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
}
.nav-logo {
  font-size: 20px;
  font-weight: 800;
  color: var(--red);
  letter-spacing: -0.03em;
}
.nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.counter-img {
  height: 36px;
  width: auto;
  opacity: 0.85;
}
.theme-btn {
  width: 36px;
  height: 36px;
  border: 1px solid var(--border);
  background: var(--bg-2);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--text-2);
  transition: background var(--trans), border-color var(--trans);
}
.theme-btn:hover {
  background: var(--bg-3);
  border-color: var(--border-strong);
}

/* LAYOUT */
.main {
  margin-top: var(--nav-h);
  padding: 48px 24px 80px;
  max-width: 1200px;
  margin-left: auto;
  margin-right: auto;
}
.main { margin-top: calc(var(--nav-h) + 0px); }

/* HEADER */
.page-header {
  margin-bottom: 40px;
  padding-top: 16px;
}
.page-title {
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1.1;
  color: var(--text);
  margin-bottom: 6px;
}
.page-subtitle {
  font-size: 15px;
  color: var(--text-3);
}

/* TOOLBAR (search + filter) */
.toolbar {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
}
.search-input {
  width: 100%;
  padding: 10px 16px 10px 40px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-md);
  background: var(--bg-2);
  color: var(--text);
  font-size: 15px;
  transition: border-color var(--trans), background var(--trans);
}
.search-input:focus {
  outline: none;
  border-color: var(--red);
  background: var(--bg);
}
.search-input::placeholder { color: var(--text-3); }
.search-icon {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  color: var(--text-3);
  pointer-events: none;
}
.filter-group {
  display: flex;
  gap: 4px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 4px;
}
.tab-btn {
  padding: 8px 18px;
  border: none;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-3);
  font-size: 14px;
  font-weight: 600;
  transition: background var(--trans), color var(--trans);
}
.tab-btn:hover { color: var(--text); background: var(--bg-3); }
.tab-btn.active { background: var(--red); color: #fff; }

/* STATS BAR */
.stats-bar {
  display: flex;
  gap: 20px;
  margin-bottom: 32px;
  font-size: 13px;
  color: var(--text-3);
}
.stat-val {
  font-weight: 700;
  color: var(--red);
}

/* FAVORITES SECTION */
.fav-section {
  margin-bottom: 48px;
}
.section-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 12px;
}
.fav-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.fav-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  background: var(--bg-2);
  border: 1px solid transparent;
  cursor: pointer;
  transition: border-color var(--trans), background var(--trans);
}
.fav-row:hover, .fav-row:focus-visible {
  border-color: var(--red-border);
  background: var(--red-dim);
  outline: none;
}
.fav-row-left {
  width: 4px;
  height: 28px;
  background: var(--red);
  border-radius: 2px;
  flex-shrink: 0;
}
.fav-row-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.fav-row-link {
  font-size: 13px;
  color: var(--red);
  font-weight: 600;
  padding: 4px 10px;
  border: 1px solid var(--red-border);
  border-radius: 6px;
  white-space: nowrap;
  flex-shrink: 0;
}
.fav-row:hover .fav-row-link { background: var(--red); color: #fff; }
.fav-row-remove {
  width: 28px;
  height: 28px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: transparent;
  color: var(--text-3);
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background var(--trans), border-color var(--trans), color var(--trans);
}
.fav-row-remove:hover { background: #cc0000; border-color: #cc0000; color: #fff; }

/* TOOLS GRID */
.tools-section {}
.tools-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}
.tool-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  display: flex;
  flex-direction: column;
  cursor: pointer;
  transition: border-color var(--trans), background var(--trans), transform var(--trans), box-shadow var(--trans);
  position: relative;
  overflow: hidden;
}
.tool-card:hover, .tool-card:focus-visible {
  border-color: var(--red-border);
  background: var(--bg-3);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  outline: none;
}
.tool-card-accent {
  height: 3px;
  background: var(--bg-3);
  transition: background var(--trans);
}
.tool-card:hover .tool-card-accent,
.tool-card:focus-visible .tool-card-accent { background: var(--red); }

.tool-body {
  padding: 20px 20px 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.tool-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}
.tool-name {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1.3;
}
.fav-toggle {
  width: 32px;
  height: 32px;
  border: 1px solid var(--border);
  border-radius: 50%;
  background: var(--bg);
  color: var(--text-3);
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background var(--trans), border-color var(--trans), color var(--trans);
}
.fav-toggle:hover { border-color: var(--red); color: var(--red); }
.fav-toggle.active { background: var(--red); border-color: var(--red); color: #fff; }

.tool-desc {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.65;
  flex: 1;
  margin-bottom: 14px;
}
.tool-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
}
.tag {
  padding: 3px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 11px;
  color: var(--text-3);
  font-weight: 500;
  letter-spacing: 0.02em;
}
.tool-link {
  display: block;
  padding: 9px 0;
  border-top: 1px solid var(--border);
  font-size: 13px;
  font-weight: 700;
  color: var(--red);
  letter-spacing: 0.01em;
  transition: color var(--trans);
  text-align: right;
}
.tool-card:hover .tool-link,
.tool-card:focus-visible .tool-link { color: var(--text); }
.tool-link::after { content: ' →'; }

/* EMPTY */
.empty {
  grid-column: 1/-1;
  padding: 80px 0;
  text-align: center;
  color: var(--text-3);
}
.empty-text { font-size: 15px; }

/* HIDDEN */
.hidden { display: none !important; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .main { padding: 32px 16px 60px; }
  .page-title { font-size: 28px; }
  .tools-grid { grid-template-columns: 1fr; gap: 12px; }
  .toolbar { gap: 8px; }
  .filter-group { width: 100%; }
  .tab-btn { flex: 1; text-align: center; }
  .fav-row-name { font-size: 13px; }
}
@media (max-width: 480px) {
  .nav { padding: 0 16px; }
  .page-title { font-size: 24px; }
  .counter-img { height: 28px; }
}

/* DARK MODE AUTO (system) */
@media (prefers-color-scheme: dark) {
  html:not([data-theme="light"]) {
    --bg: #111111;
    --bg-2: #1c1c1c;
    --bg-3: #262626;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.18);
    --text: #f0f0f0;
    --text-2: #bbbbbb;
    --text-3: #666666;
  }
}
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-logo"><a href="/" style="color:inherit">オノゴロ</a></span>
  <div class="nav-right">
    <a href="/"><img src="https://counter.256server.com/@:ms05?theme=moebooru" alt="アクセスカウンタ" class="counter-img"></a>
    <button class="theme-btn" id="themeBtn" title="テーマ切替">◑</button>
  </div>
</nav>

<main class="main">

  <div class="page-header">
    <h1 class="page-title">ツールコレクション</h1>
    <p class="page-subtitle">シンプルで実用的なツール一覧</p>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" class="search-input" id="searchInput" placeholder="ツールを検索...">
    </div>
    <div class="filter-group">
      <button class="tab-btn active" data-filter="all">すべて</button>
      <button class="tab-btn" data-filter="favorites">お気に入り</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <span><span class="stat-val" id="totalCount">0</span> ツール</span>
    <span><span class="stat-val" id="favCount">0</span> お気に入り</span>
  </div>

  <!-- Favorites compact list -->
  <section class="fav-section hidden" id="favSection">
    <p class="section-label">お気に入り</p>
    <div class="fav-list" id="favList"></div>
  </section>

  <!-- All tools grid -->
  <section class="tools-section">
    <p class="section-label" id="mainLabel">すべてのツール</p>
    <div class="tools-grid" id="toolsGrid">
      <div class="empty"><p class="empty-text">読み込み中...</p></div>
    </div>
  </section>

</main>

<script>
/* =============================================
   TOOL DATA
   ツールデータは同ディレクトリの /ms05/page/tools.xml から読み込みます。
   構成例:
     <tools>
       <tool id="1">
         <url>/ms05/tools/xxx.html</url>
         <name>ツール名</name>
         <desc>説明文</desc>
         <tags><tag>タグ1</tag><tag>タグ2</tag></tags>
       </tool>
     </tools>
   ツールの追加・変更は tools.xml を編集してください。
============================================= */
const TOOLS_XML_PATH = 'ms05/page/tools.xml';
let TOOLS = [];

/* STATE */
let favorites = [];
let currentFilter = 'all';
let searchQuery = '';

/* THEME */
const themeBtn = document.getElementById('themeBtn');
const html = document.documentElement;

function getSystemTheme() {
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function applyTheme(theme) {
  html.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  themeBtn.textContent = theme === 'dark' ? '○' : '●';
}

function initTheme() {
  const stored = localStorage.getItem('theme');
  applyTheme(stored || getSystemTheme());
}

themeBtn.addEventListener('click', () => {
  const current = html.getAttribute('data-theme');
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

/* FAVORITES */
function loadFavorites() {
  try {
    favorites = JSON.parse(localStorage.getItem('toolFavorites') || '[]');
  } catch(e) {
    favorites = [];
  }
}

function saveFavorites() {
  localStorage.setItem('toolFavorites', JSON.stringify(favorites));
}

function toggleFavorite(id) {
  const i = favorites.indexOf(id);
  if (i > -1) favorites.splice(i, 1);
  else favorites.push(id);
  saveFavorites();
  render();
}

/* TOOL DATA LOADING (external XML) */
function text(node, selector) {
  const el = node.querySelector(selector);
  return el ? el.textContent.trim() : '';
}

function parseToolsXML(xmlText) {
  const xml = new DOMParser().parseFromString(xmlText, 'application/xml');
  if (xml.querySelector('parsererror')) {
    throw new Error('tools.xml の解析に失敗しました');
  }
  return Array.from(xml.querySelectorAll('tools > tool')).map(node => ({
    id: parseInt(node.getAttribute('id'), 10),
    url: text(node, 'url'),
    name: text(node, 'name'),
    desc: text(node, 'desc'),
    tags: Array.from(node.querySelectorAll('tags > tag')).map(t => t.textContent.trim())
  })).filter(t => !Number.isNaN(t.id) && t.url && t.name);
}

async function loadTools() {
  try {
    const res = await fetch(TOOLS_XML_PATH, { cache: 'no-store' });
    if (!res.ok) throw new Error('tools.xml の取得に失敗しました (' + res.status + ')');
    const xmlText = await res.text();
    TOOLS = parseToolsXML(xmlText);
  } catch (err) {
    console.error(err);
    document.getElementById('toolsGrid').innerHTML =
      '<div class="empty"><p class="empty-text">ツールデータの読み込みに失敗しました</p></div>';
    document.getElementById('mainLabel').textContent = 'すべてのツール';
    document.getElementById('totalCount').textContent = '0';
    return;
  }
  render();
}

/* FILTER */
function getFiltered() {
  let list = TOOLS;
  if (currentFilter === 'favorites') {
    list = list.filter(t => favorites.includes(t.id));
  }
  if (searchQuery) {
    const q = searchQuery;
    list = list.filter(t =>
      t.name.toLowerCase().includes(q) ||
      t.desc.toLowerCase().includes(q) ||
      t.tags.some(tag => tag.toLowerCase().includes(q))
    );
  }
  return list;
}

/* RENDER */
function renderFavSection() {
  const favItems = TOOLS.filter(t => favorites.includes(t.id));
  const section = document.getElementById('favSection');
  const list = document.getElementById('favList');

  // お気に入りタブ中 or お気に入りなし → 非表示
  if (favItems.length === 0 || currentFilter === 'favorites') {
    section.classList.add('hidden');
    return;
  }
  section.classList.remove('hidden');

  list.innerHTML = favItems.map(t => `
    <div class="fav-row" data-url="${t.url}" tabindex="0" role="link" aria-label="${t.name}を開く">
      <span class="fav-row-left"></span>
      <span class="fav-row-name">${t.name}</span>
      <span class="fav-row-link">開く</span>
      <button class="fav-row-remove" data-id="${t.id}" title="お気に入りを外す">✕</button>
    </div>
  `).join('');
}

function renderToolsGrid() {
  const filtered = getFiltered();
  const grid = document.getElementById('toolsGrid');
  const label = document.getElementById('mainLabel');

  if (currentFilter === 'favorites') {
    label.textContent = 'お気に入りツール';
  } else if (searchQuery) {
    label.textContent = '検索結果';
  } else {
    label.textContent = 'すべてのツール';
  }

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty"><p class="empty-text">該当するツールが見つかりません</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(t => {
    const isFav = favorites.includes(t.id);
    const tags = t.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
    return `
      <div class="tool-card" data-url="${t.url}" tabindex="0" role="link" aria-label="${t.name}を開く">
        <div class="tool-card-accent"></div>
        <div class="tool-body">
          <div class="tool-header">
            <h3 class="tool-name">${t.name}</h3>
            <button class="fav-toggle ${isFav ? 'active' : ''}" data-id="${t.id}" title="${isFav ? 'お気に入りを外す' : 'お気に入りに追加'}">${isFav ? '★' : '☆'}</button>
          </div>
          <p class="tool-desc">${t.desc}</p>
          <div class="tool-tags">${tags}</div>
          <span class="tool-link">開く</span>
        </div>
      </div>
    `;
  }).join('');
}

function renderStats() {
  const favCount = TOOLS.filter(t => favorites.includes(t.id)).length;
  const filtered = getFiltered();
  document.getElementById('totalCount').textContent = filtered.length;
  document.getElementById('favCount').textContent = favCount;
}

function render() {
  renderFavSection();
  renderToolsGrid();
  renderStats();
}

/* EVENTS */
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  render();
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    e.currentTarget.classList.add('active');
    currentFilter = e.currentTarget.dataset.filter;
    render();
  });
});

// イベント委任: お気に入りトグル・削除・カード/行全体のクリックで開く
document.addEventListener('click', e => {
  const favBtn = e.target.closest('.fav-toggle');
  if (favBtn) {
    e.preventDefault();
    toggleFavorite(parseInt(favBtn.dataset.id));
    return;
  }
  const removeBtn = e.target.closest('.fav-row-remove');
  if (removeBtn) {
    toggleFavorite(parseInt(removeBtn.dataset.id));
    return;
  }
  const card = e.target.closest('.tool-card');
  if (card && card.dataset.url) {
    window.location.href = card.dataset.url;
    return;
  }
  const favRow = e.target.closest('.fav-row');
  if (favRow && favRow.dataset.url) {
    window.location.href = favRow.dataset.url;
  }
});

// キーボード操作: フォーカスしたカード/行で Enter または Space を押すと開く
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  if (e.target.closest('.fav-toggle') || e.target.closest('.fav-row-remove')) return;

  const card = e.target.closest('.tool-card');
  if (card && card.dataset.url) {
    e.preventDefault();
    window.location.href = card.dataset.url;
    return;
  }
  const favRow = e.target.closest('.fav-row');
  if (favRow && favRow.dataset.url) {
    e.preventDefault();
    window.location.href = favRow.dataset.url;
  }
});

/* INIT */
initTheme();
loadFavorites();
loadTools();
</script>
</body>
</html>

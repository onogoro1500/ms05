<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カウンター</title>
<style>
  body {
    font-family: sans-serif;
    background: #f5f5f5;
  }

  /* カウンタ全体の枠組み */
  .my-counter-wrapper {
    text-align: center;
    margin: 20px auto;
  }
  /* ラベル文字（WELCOME! YOU ARE / VISITOR!） */
  .counter-label {
    display: block;
    font-size: 14px;
    color: #333;
    margin: 5px 0;
    font-weight: bold;
  }
  /* 数字画像が並ぶエリア */
  .counter-images-area {
    display: flex; /* 画像を横並びにする */
    justify-content: center; /* 中央に寄せる */
    align-items: center;
    margin: 10px 0;
  }
  /* 数字画像1枚ずつのスタイル */
  .counter-digit-img {
    display: block;
    height: 32px; /* 画像の高さを好きなサイズに固定する */
    width: auto; /* 横幅は自動調整（画像の縦横比を保つ） */
    margin: 0 -1px; /* 画像同士の隙間をなくす（必要に応じて調整） */
    border: none;
  }
</style>
</head>
<body>

<div class="my-counter-wrapper">
  <span class="counter-label">WELCOME! YOU ARE</span>
  <div id="custom-counter" class="counter-images-area">
    Loading...
  </div>
  <span class="counter-label">VISITOR!</span>
</div>
  
<script>
  document.addEventListener("DOMContentLoaded", function() {
    // 💡 あなたのサイト専用の識別キー（半角英数字で好きな文字に変えてもOKです）
    const siteKey = "my_unique_github_io_counter_2026"; 
    
    // 現在も無料で使える信頼性の高いカウントAPIを利用します
    const counterUrl = `https://api.countapi.xyz/hit/default/${siteKey}`;
    
    // 画像フォルダへのパス（index.htmlと同じ場所にある counter_images フォルダ）
    const imagePath = "counter_images/"; 
    const counterContainer = document.getElementById("custom-counter");

    fetch(counterUrl)
      .then(response => {
        if (!response.ok) {
          throw new Error('ネットワークエラーが発生しました');
        }
        return response.json();
      })
      .then(data => {
        // APIから現在のアクセス数を取得（このAPIでは data.value に数字が入ります）
        const count = data.value;
        
        // 6桁に揃える（例: 000001）
        const paddedCount = String(count).padStart(6, '0');
        counterContainer.innerHTML = "";

        // 1文字ずつ画像に置き換えていく、あなたが作ったお気に入りの仕組みです！
        for (let num of paddedCount) {
          const img = document.createElement("img");
          img.src = `${imagePath}${num}.png`;
          img.alt = num;
          img.className = "counter-digit-img";
          
          // 万が一、画像が読み込めなかった時の保険（数字を文字で表示）
          img.onerror = function() {
            this.style.display = 'none';
            const span = document.createElement("span");
            span.innerText = num;
            span.style.fontSize = "24px";
            span.style.margin = "0 2px";
            span.style.fontWeight = "bold";
            counterContainer.appendChild(span);
          };

          counterContainer.appendChild(img);
        }
      })
      .catch(error => {
        console.error("Counter Error:", error);
        counterContainer.innerText = "Error (通信失敗)";
      });
  });
</script>
</body>
</html>

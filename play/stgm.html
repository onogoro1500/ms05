<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:'DM Mono',monospace;user-select:none;touch-action:none;-webkit-tap-highlight-color:transparent}
#wp{display:none;position:fixed;inset:0;background:#000;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999}
#wp p{font-size:.7rem;letter-spacing:.28em;color:rgba(255,255,255,.24)}

#stage{position:relative;flex:1 1 auto;min-height:0;overflow:hidden}
canvas{display:block;position:absolute;inset:0;width:100%;height:100%}
#controls{position:relative;flex:0 0 auto;display:flex;align-items:stretch;height:clamp(126px,21vh,190px);background:rgba(255,255,255,.025);border-top:1px solid rgba(255,255,255,.07);padding-bottom:env(safe-area-inset-bottom,0px)}
#dpad{position:relative;flex:1 1 56%;height:100%;touch-action:none}
.dbtn{position:absolute;width:clamp(48px,11vh,64px);height:clamp(48px,11vh,64px);border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.02);color:rgba(255,255,255,.3);font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:background .08s,border-color .08s,color .08s}
.dbtn.active{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.42);color:#fff}
.dp-up{left:50%;top:calc(50% - clamp(50px,11.5vh,66px));transform:translate(-50%,-50%)}

.dp-left{left:calc(50% - clamp(50px,11.5vh,66px));top:50%;transform:translate(-50%,-50%)}
.dp-right{left:calc(50% + clamp(50px,11.5vh,66px));top:50%;transform:translate(-50%,-50%)}

.btn:active{transform:scale(.86)}
#bs{width:clamp(52px,12vh,68px);height:clamp(52px,12vh,68px);font-size:.44rem;letter-spacing:.16em}
#bs.on{border-color:rgba(255,255,255,.42);color:rgba(255,255,255,.72);background:rgba(255,255,255,.08)}
#bb{width:clamp(66px,15vh,82px);height:clamp(66px,15vh,82px);font-size:.44rem;letter-spacing:.1em;border-color:rgba(255,100,40,.28);color:rgba(255,120,50,.5)}
#bb.on{border-color:rgba(255,100,40,.55);color:rgba(255,120,50,.85)}
#bb.off{opacity:.14;pointer-events:none}
#bn{position:absolute;top:5px;right:7px;font-size:.42rem;color:rgba(255,170,70,.65)}
#bomb-pips{position:absolute;top:-14px;left:50%;transform:translateX(-50%);display:flex;gap:3px}
.bpip{width:6px;height:6px;border-radius:50%;background:rgba(255,120,50,.25);transition:background .2s}
.bpip.active{background:rgba(255,130,55,.85);box-shadow:0 0 4px rgba(255,120,50,.6)}
#sys-bar{position:fixed;top:calc(8px + env(safe-area-inset-top,0px));right:calc(8px + env(safe-area-inset-right,0px));z-index:200;display:flex;gap:0;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:14px;overflow:hidden;transition:opacity .35s}
#sys-bar.dim{opacity:.22}
.sb{width:34px;height:28px;background:transparent;border:none;border-left:.5px solid rgba(255,255,255,.09);color:rgba(255,255,255,.65);font-family:'DM Mono',monospace;font-size:.56rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .12s,color .12s}
.sb:first-child{border-left:none}
.sb:active{background:rgba(255,255,255,.14);color:#fff}
.ov{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.ov h1{font-size:clamp(1.3rem,3.8vmin,2.4rem);font-weight:300;letter-spacing:.42em;margin-bottom:clamp(8px,2.4vmin,20px)}
.ov h1.red{color:rgba(255,60,30,1)}.ov h1.grn{color:rgba(60,210,120,1)}
.mb{display:block;width:clamp(170px,38vmin,222px);padding:clamp(7px,1.6vmin,10px) 0;margin:2px 0;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.3);font-family:'DM Mono',monospace;font-size:clamp(.52rem,1.2vmin,.68rem);letter-spacing:.2em;text-align:left;cursor:pointer;transition:color .12s,border-color .12s}
.mb:active{color:rgba(255,255,255,.75);border-color:rgba(255,255,255,.3)}.mb.hi{color:rgba(255,255,255,.72);border-color:rgba(255,255,255,.25)}
.pnl{width:clamp(210px,46vmin,280px);border-top:1px solid rgba(255,255,255,.06);margin:clamp(6px,1.6vmin,12px) 0}
.pr{display:flex;justify-content:space-between;align-items:center;padding:clamp(5px,1.2vmin,8px) 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:clamp(.5rem,1.1vmin,.62rem)}
.pr .k{color:rgba(255,255,255,.22);letter-spacing:.14em}.pr .v{color:rgba(255,255,255,.62)}
.pr select{background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.52);font-family:'DM Mono',monospace;font-size:.5rem;padding:2px 4px}
.tog{position:relative;width:32px;height:18px}
.tog input{opacity:0;width:0;height:0}
.tog span{position:absolute;inset:0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:9px;cursor:pointer;transition:all .2s}
.tog span::before{content:'';position:absolute;width:12px;height:12px;left:2px;top:2px;background:rgba(255,255,255,.2);border-radius:50%;transition:transform .2s,background .2s}
.tog input:checked+span{border-color:rgba(255,255,255,.34)}.tog input:checked+span::before{transform:translateX(14px);background:#fff}
.grd{font-size:clamp(2.4rem,6vmin,4.2rem);font-weight:300;letter-spacing:.15em;color:rgba(255,255,255,.68);margin:clamp(3px,.7vmin,6px) 0 clamp(6px,1.6vmin,12px)}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fi{animation:fi .22s ease both}.fi1{animation:fi .22s .04s ease both}.fi2{animation:fi .22s .08s ease both}
#o-count{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:150;pointer-events:none}
#count-num{font-size:clamp(4rem,12vmin,8rem);font-weight:300;letter-spacing:.1em;color:#fff;opacity:0;transform:scale(1.6);transition:opacity .18s,transform .28s}
#count-num.show{opacity:1;transform:scale(1)}
#count-num.go{color:rgba(80,240,160,1)}
#spell-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:160;pointer-events:none;text-align:center;opacity:0;transition:opacity .3s}
#spell-title{font-size:clamp(.9rem,2.2vmin,1.4rem);font-weight:300;letter-spacing:.32em;color:rgba(255,220,80,1);text-shadow:0 0 20px rgba(255,200,0,.6)}
#spell-sub{font-size:clamp(.44rem,1.1vmin,.58rem);letter-spacing:.28em;color:rgba(255,255,255,.38);margin-top:4px}
#spell-timer-bar{position:fixed;top:calc(env(safe-area-inset-top,0px) + 44px + 10px);left:50%;transform:translateX(-50%);width:min(52vw,420px);height:4px;background:rgba(255,255,255,.06);border-radius:2px;z-index:50;display:none}
#spell-timer-fill{height:100%;border-radius:2px;background:rgba(255,220,80,.7);transition:width .25s linear}
#deathbomb-flash{position:fixed;inset:0;background:rgba(255,200,80,.0);pointer-events:none;z-index:180;transition:background .08s}
</style>

<script>
'use strict';
const rnd=n=>Math.random()*n;
const rndi=(a,b)=>Math.floor(a+Math.random()*(b-a));
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const $=id=>document.getElementById(id);
const show=id=>$(id).style.display='flex';
const hide=id=>$(id).style.display='none';
const lerp=(a,b,t)=>a+(b-a)*t;
const angle=(x1,y1,x2,y2)=>Math.atan2(y2-y1,x2-x1);

/* STORE */
const Store={
  KC:'stgm9_cfg',KH:'stgm9_hs',
  loadCfg(){const d={difficulty:'normal',sound:true,scorePop:true,shake:true};try{return Object.assign(d,JSON.parse(localStorage.getItem(this.KC)||'{}'));}catch{return d;}},
  saveCfg(c){try{localStorage.setItem(this.KC,JSON.stringify(c));}catch{}},
  loadHS(){try{return JSON.parse(localStorage.getItem(this.KH)||'[]');}catch{return[];}},
  clearHS(){try{localStorage.removeItem(this.KH);}catch{}},
  addHS(list,e){const next=[...list,e].sort((a,b)=>b.score-a.score).slice(0,10);try{localStorage.setItem(this.KH,JSON.stringify(next));}catch{}return next;},
};

/* SFX */
const Sfx={
  ctx:null,on:true,
  init(){if(this.ctx)return;try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();}catch{}},
  _r(){if(this.ctx?.state==='suspended')this.ctx.resume();},
  _o(f,v,t,a,d,f2){if(!this.ctx||!this.on)return;this._r();const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.connect(g);g.connect(this.ctx.destination);o.type=t;const T=this.ctx.currentTime;o.frequency.setValueAtTime(f,T);if(f2)o.frequency.exponentialRampToValueAtTime(f2,T+a+d);g.gain.setValueAtTime(0,T);g.gain.linearRampToValueAtTime(v,T+a);g.gain.exponentialRampToValueAtTime(.001,T+a+d);o.start(T);o.stop(T+a+d+.02);},
  _n(v,d,lp){if(!this.ctx||!this.on)return;this._r();const buf=this.ctx.createBuffer(1,Math.ceil(this.ctx.sampleRate*d),this.ctx.sampleRate);const arr=buf.getChannelData(0);for(let i=0;i<arr.length;i++)arr[i]=Math.random()*2-1;const s=this.ctx.createBufferSource(),g=this.ctx.createGain();if(lp){const f=this.ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=lp;s.connect(f);f.connect(g);}else s.connect(g);g.connect(this.ctx.destination);const T=this.ctx.currentTime;g.gain.setValueAtTime(v,T);g.gain.exponentialRampToValueAtTime(.001,T+d);s.buffer=buf;s.start(T);},
  shoot(){this._o(1800,.025,'square',.002,.03,600);},
  hit(){this._n(.25,.1,900);this._o(200,.08,'sawtooth',.002,.1);},
  explode(){this._n(.2,.15,700);},
  bigBang(){this._n(.5,.4,280);this._o(70,.2,'sawtooth',.01,.35);},
  powerup(){this._o(440,.12,'sine',.02,.24,1100);},
  powerMax(){this._o(880,.18,'sine',.02,.4,1760);setTimeout(()=>this._o(1100,.14,'sine',.01,.3,2200),100);},
  bomb(){this._n(.55,.5,240);this._o(75,.18,'sawtooth',.01,.35);},
  deathbomb(){this._o(440,.22,'square',.005,.28,110);this._n(.35,.28,350);},
  boss(){this._n(.28,.22,480);this._o(110,.15,'square',.01,.22);},
  graze(){this._o(1400,.03,'sine',.003,.05);},
  clear(){this._o(523,.16,'sine',.03,.3,1046);setTimeout(()=>this._o(784,.13,'sine',.02,.38),170);setTimeout(()=>this._o(1046,.1,'sine',.02,.4),340);},
  phase(){this._n(.3,.18,550);this._o(200,.14,'sawtooth',.01,.18);},
  warn(){this._o(150,.18,'square',.01,.5);},
  countdown(){this._o(660,.14,'sine',.01,.2);},
  go(){this._o(880,.2,'sine',.01,.28,1200);},
  spell(){for(let i=0;i<3;i++)setTimeout(()=>this._o(523*Math.pow(1.25,i),.14,'sine',.02,.45),i*160);},
  spellBonus(){this._o(1046,.2,'sine',.01,.5,2093);setTimeout(()=>this._o(1318,.16,'sine',.01,.4,2637),180);},
  convert(){this._o(1200,.08,'sine',.005,.2,2400);},
  extend(){for(let i=0;i<4;i++)setTimeout(()=>this._o(440*Math.pow(1.2,i),.15,'sine',.01,.35),i*100);},
};

/* BULLET POOL */
const _bf=[];
const bGet=()=>_bf.pop()??{x:0,y:0,vx:0,vy:0,r:0,c:'',cc:'',rim:'',dead:false,homing:false,str:0,grazed:false,type:'ball',age:0,ax:0,ay:0,delay:0,rot:0,rotSpd:0,curl:0,accel:1,waveAmp:0,waveFreq:0,wavePhase:0};
const bRet=b=>{if(_bf.length<1400)_bf.push(b);};
const bRetAll=arr=>{for(const b of arr)bRet(b);arr.length=0;};

/* PARTICLE POOL */
const _pf=[];
const pGet=()=>_pf.pop()??{x:0,y:0,vx:0,vy:0,r:0,life:0,maxLife:0,c:'',type:'dot'};
const pRet=p=>{if(_pf.length<1000)_pf.push(p);};

/* CONSTANTS */
const K={
  FIRE_MS:70,MAX_POW:400,POW_K:5,POW_H:15,
  INVULN:180,BOMB_F:200,BOMB_INV:220,DEATHBOMB_F:8,
  COMBO_DEC:240,COMBO_MAX:10,
  HIT_N:3.5,HIT_S:1.8,GRAZE_R:20,GRAZE_PT:10,
  DROP:.28,STAGE_SEC:36,MAX_STAGE:6,WARN_F:160,
  BSPD:.72,E_CD:68,E_CDV:52,
  TOP:46,BOT:16,
  SPELL_TIME:60*18,
  EXT_SCORE:500000,
};

const DIFF={
  easy:  {life:8, bomb:5,maxBomb:6,growth:.04,spd:.6, bDmg:1.2,recover:true},
  normal:{life:6, bomb:2,maxBomb:3,growth:.07,spd:.8, bDmg:1.0,recover:true},
  hard:  {life:5, bomb:1,maxBomb:2,growth:.11,spd:1.0,bDmg:.85,recover:false},
};

/* PALETTE */
const PALETTE={
  red:   {ball:'#ff4466',core:'#ffbbcc',rim:'#ff0033'},
  blue:  {ball:'#3399ff',core:'#bbddff',rim:'#0055ff'},
  cyan:  {ball:'#00eeff',core:'#aaffff',rim:'#00aacc'},
  green: {ball:'#44ff88',core:'#aaffcc',rim:'#00cc44'},
  yellow:{ball:'#ffee22',core:'#ffffc0',rim:'#ffaa00'},
  orange:{ball:'#ff8833',core:'#ffd0a0',rim:'#ff4400'},
  purple:{ball:'#cc44ff',core:'#eebeff',rim:'#8800ff'},
  white: {ball:'#eeeeff',core:'#ffffff',rim:'#aaaadd'},
  pink:  {ball:'#ff66cc',core:'#ffb0ee',rim:'#ff0099'},
  teal:  {ball:'#00ffcc',core:'#aeffee',rim:'#00aa88'},
  gold:  {ball:'#ffcc00',core:'#fff0a0',rim:'#cc8800'},
  silver:{ball:'#ccddee',core:'#eeffff',rim:'#8899bb'},
};
const PAL_KEYS=Object.keys(PALETTE);
function rPal(){return PALETTE[PAL_KEYS[Math.floor(rnd(PAL_KEYS.length))]]}

/* BULLET FACTORY */
function mkB(x,y,vx,vy,pal,type,ax,ay,delay){
  const b=bGet();
  b.x=x;b.y=y;b.vx=vx;b.vy=vy;
  b.ax=ax||0;b.ay=ay||0;
  b.delay=delay||0;
  b.c=pal.ball;b.cc=pal.core;b.rim=pal.rim;
  b.type=type||'ball';
  b.dead=false;b.grazed=false;b.homing=false;b.str=0;b.age=0;b.rot=0;b.rotSpd=0;
  b.curl=0;b.accel=1;b.waveAmp=0;b.waveFreq=0;b.wavePhase=0;
  b.r=type==='large'?9:type==='oval'?7:type==='star'?5.5:type==='rice'?4:type==='knife'?3:type==='bubble'?8:5;
  return b;
}

/* ====================================
   東方風スペルカード弾幕（大幅強化版）
   ==================================== */

/* 弾をcurlして軌道を曲げるヘルパー */
function addCurlBullet(x,y,speed,angle,curl,pal,type,delay){
  const b=mkB(x,y,Math.cos(angle)*speed,Math.sin(angle)*speed,pal,type||'ball',0,0,delay||0);
  b.curl=curl||0;
  return b;
}

/* 弾速加速ヘルパー */
function addAccelBullet(x,y,speed,angle,accel,pal,type,delay){
  const b=mkB(x,y,Math.cos(angle)*speed,Math.sin(angle)*speed,pal,type||'ball',0,0,delay||0);
  b.accel=accel||1;
  return b;
}

/* ウェーブ弾ヘルパー */
function addWaveBullet(x,y,vx,vy,waveAmp,waveFreq,wavePhase,pal,type){
  const b=mkB(x,y,vx,vy,pal,type||'ball');
  b.waveAmp=waveAmp;b.waveFreq=waveFreq;b.wavePhase=wavePhase||0;
  return b;
}

/* ====== 通常敵パターン（大幅強化版） ====== */
function doNormalShoot(key,ex,ey,pals,s){
  const px=G.px+12,py=G.py+12;
  const pal=pals[Math.floor(rnd(pals.length))];
  const pal2=pals[1]||pal;

  switch(key){
    /* 8方向放射 */
    case'radial':
      for(let i=0;i<8;i++){
        const a=(Math.PI*2/8)*i+G.spA;
        G.eB.push(mkB(ex,ey,Math.cos(a)*2.4*s,Math.sin(a)*2.4*s,pal,'ball'));
      }
      G.spA+=.24;break;

    /* aimed 3way */
    case'aimed3':{
      const a=angle(ex,ey,px,py);
      for(let i=-1;i<=1;i++){
        G.eB.push(mkB(ex,ey,Math.cos(a+i*.2)*3.2*s,Math.sin(a+i*.2)*3.2*s,pal,'rice'));
      }
      break;}

    /* aimed 5way */
    case'aimed5':{
      const a=angle(ex,ey,px,py);
      for(let i=-2;i<=2;i++){
        G.eB.push(mkB(ex,ey,Math.cos(a+i*.18)*2.8*s,Math.sin(a+i*.18)*2.8*s,pal,'ball'));
      }
      break;}

    /* スプレッド */
    case'spread':
      for(let i=-3;i<=3;i++){
        G.eB.push(mkB(ex,ey,i*1.1*s,2.8*s,pal,'ball'));
      }
      break;

    /* homing大弾 */
    case'homing':{
      const b=mkB(ex,ey,0,1.8*s,pal,'large');b.homing=true;b.str=.055*s;G.eB.push(b);
      break;}

    /* 螺旋3way */
    case'spiral':
      for(let i=0;i<3;i++){
        const a=G.spA+(Math.PI*2/3)*i;
        G.eB.push(mkB(ex,ey,Math.cos(a)*2.6*s,Math.sin(a)*2.6*s,pal,'ball'));
      }
      G.spA+=.38;break;

    /* knife aimed 3way */
    case'knife_aimed':{
      const a=angle(ex,ey,px,py);
      G.eB.push(mkB(ex,ey,Math.cos(a)*5*s,Math.sin(a)*5*s,pal,'knife'));
      G.eB.push(mkB(ex,ey,Math.cos(a+.18)*4.5*s,Math.sin(a+.18)*4.5*s,pal,'knife'));
      G.eB.push(mkB(ex,ey,Math.cos(a-.18)*4.5*s,Math.sin(a-.18)*4.5*s,pal,'knife'));
      break;}

    /* ── 新パターン：カーブ弾 ── */
    case'curve_shot':{
      for(let i=0;i<6;i++){
        const a=angle(ex,ey,px,py)+(i-2.5)*.15;
        const sign=i%2===0?1:-1;
        const b=addCurlBullet(ex,ey,2.8*s,a,sign*.024,pal,'rice');
        b.delay=i*4;
        G.eB.push(b);
      }
      break;}

    /* ── 新パターン：ウェーブ ── */
    case'wave_shot':{
      for(let i=0;i<3;i++){
        const a=Math.PI/2+(i-1)*.5;
        const b=addWaveBullet(ex,ey,Math.cos(a)*2.2*s,Math.sin(a)*2.2*s,
          22,0.14,i*1.0,i===1?pal:pal2,'oval');
        b.delay=i*8;
        G.eB.push(b);
      }
      break;}

    /* ── 新パターン：加速弾 ── */
    case'accel_shot':{
      const a=angle(ex,ey,px,py);
      for(let i=0;i<9;i++){
        const b=addAccelBullet(ex,ey,1.2*s+i*.3,a+(i-1.5)*.15,1.032,pal,'ball',i*6);
        G.eB.push(b);
      }
      break;}

    /* ── 新パターン：扇形急速 ── */
    case'fan_burst':{
      const a=angle(ex,ey,px,py);
      for(let i=0;i<6;i++){
        const b=mkB(ex,ey,
Math.cos(a+(i-3)*.16)*2.2*s,
Math.sin(a+(i-3)*.16)*2.2*s,
          i%2===0?pal:pal2,i===0||i===6?'knife':'ball');
        b.delay=Math.abs(i-3)*3;
        G.eB.push(b);
      }
      break;}

    /* ── 新パターン：回転放射+aimed ── */
    case'orbit_aimed':{
      /* 回転リング */
      for(let i=0;i<6;i++){
        const a=(Math.PI*2/6)*i+G.spA;
        G.eB.push(mkB(ex,ey,Math.cos(a)*2.0*s,Math.sin(a)*2.0*s,pal,'star'));
      }
      /* aimed knife */
      const a0=angle(ex,ey,px,py);
      G.eB.push(mkB(ex,ey,Math.cos(a0)*4.8*s,Math.sin(a0)*4.8*s,pal2,'knife'));
      G.spA+=.3;
      break;}
  }
}

/* CANVAS */
const cv=$('cv');
const ctx=cv.getContext('2d',{alpha:false});
let W=0,H=0;
function resize(){
  const dpr=Math.min(window.devicePixelRatio||1,3);
  const r=cv.getBoundingClientRect();
  cv.width=Math.round(r.width*dpr);cv.height=Math.round(r.height*dpr);
  W=r.width;H=r.height;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  G.stars=mkStars();
}

/* GAME STATE */
const G={
  state:'menu',px:0,py:0,invuln:0,
  score:0,life:0,bombs:0,power:0,
  combo:0,maxCombo:0,graze:0,spawned:0,killed:0,

function mkStars(){
  return Array.from({length:70},()=>({
    x:rnd(W),y:rnd(H),r:.5+rnd(1.2),vy:.2+rnd(1.8),a:.015+rnd(.1),phase:rnd(Math.PI*2),
  }));
}

function placePlayer(){G.px=W/2-12;G.py=H-K.BOT-70;G.invuln=60;}

/* フォーメーションスポーン */
function spawnFormation(){
  const f=FORMATIONS[rndi(0,FORMATIONS.length)];
  const stageScale=Math.min(G.stage,BOSS_DEFS.length);
  const pools=[
    ['radial','aimed3','wave_shot'],
    ['aimed3','aimed5','curve_shot'],
    ['spread','homing','accel_shot'],
    ['aimed5','spiral','fan_burst'],
    ['homing','knife_aimed','orbit_aimed'],
    ['knife_aimed','spiral','curve_shot'],
  ];
  const pool=pools[Math.min(stageScale-1,pools.length-1)];
  for(let i=0;i<f.count;i++){
    const init=f.fn(i,f.count);
    const pals=[rPal(),rPal()];
    const tKey=pool[i%pool.length];
    const t=E_TYPES.find(e=>e.key===tKey)||E_TYPES[0];
    G.ens.push({
      key:t.key,w:t.w,h:t.h,hp:t.hp+(stageScale-1)*2,maxHp:t.hp+(stageScale-1)*2,sc:t.sc,pals,
      x:init.x-t.w/2,y:init.y,vx:init.vx,vy:init.vy,
      role:init.role,arcDir:init.arcDir||1,phase:rnd(Math.PI*2),
      baseX:init.x,formTimer:0,cd:K.E_CD,flash:0,
    });
    G.spawned++;
  }
  G.formF=rndi(200,380)-stageScale*18;
}

const E_TYPES=[
  {key:'radial',    w:32,h:32,hp:5, sc:80},
  {key:'aimed3',    w:30,h:30,hp:4, sc:100},
  {key:'aimed5',    w:34,h:34,hp:6, sc:120},
  {key:'spread',    w:40,h:40,hp:10,sc:150},
  {key:'homing',    w:34,h:34,hp:6, sc:130},
  {key:'spiral',    w:28,h:28,hp:3, sc:90},
  {key:'knife_aimed',w:30,h:30,hp:4,sc:110},
  {key:'curve_shot',w:30,h:30,hp:4, sc:115},
  {key:'wave_shot', w:32,h:32,hp:5, sc:105},
  {key:'accel_shot',w:28,h:28,hp:4, sc:108},
  {key:'fan_burst', w:34,h:34,hp:6, sc:125},
  {key:'orbit_aimed',w:32,h:32,hp:5,sc:118},
];

/* パーティクル */
function spawnParts(x,y,c,n,speed,lifeBase){
  for(let i=0;i<n;i++){
    const p=pGet();const a=rnd(Math.PI*2),s=(.5+rnd(1))*speed;
    p.x=x;p.y=y;p.vx=Math.cos(a)*s;p.vy=Math.sin(a)*s;
    p.r=1.5+rnd(2.5);p.life=p.maxLife=lifeBase+rnd(lifeBase*.5);p.c=c;p.type='dot';
    G.parts.push(p);
  }
}
function spawnRing(x,y,c){G.parts.push({x,y,vx:0,vy:0,r:4,life:18,maxLife:18,c,type:'ring'});}
function spawnGrazeRing(x,y){G.grazeRings.push({x,y,r:K.GRAZE_R,life:14,maxLife:14});}

function tickParts(){
  for(let i=G.parts.length-1;i>=0;i--){
    const p=G.parts[i];p.life--;
    if(p.life<=0){pRet(G.parts.splice(i,1)[0]);continue;}
    if(p.type==='dot'){p.x+=p.vx;p.y+=p.vy;p.vy+=.04;p.vx*=.97;}
    else if(p.type==='ring'){p.r+=4.5;}
  }
  for(let i=G.grazeRings.length-1;i>=0;i--){
    const r=G.grazeRings[i];r.life--;r.r+=2;if(r.life<=0)G.grazeRings.splice(i,1);
  }
}

function activateSpell(idx){
  G.spellActive=true;G.spellIdx=idx;G.spellTimer=0;
  const sp=SPELL_CARDS[idx];
  G.spellBonus=sp.bonus||50000;
  $('spell-title').textContent=sp.name;
  $('spell-sub').textContent=sp.sub;
  const el=$('spell-banner');
  el.style.opacity='1';setTimeout(()=>{el.style.opacity='0';},2400);
  $('spell-timer-bar').style.display='block';
  $('spell-timer-fill').style.width='100%';
  $('spell-timer-fill').style.transition='none';
  setTimeout(()=>{
    $('spell-timer-fill').style.transition='width '+((sp.time/60).toFixed(1))+'s linear';
    $('spell-timer-fill').style.width='0%';
  },50);
  convertBullets();
  Sfx.spell();
}

function convertBullets(){
  const pts=300;let count=0;
  for(const b of G.eB){
    if(!b.dead){G.convertPts.push({x:b.x,y:b.y,life:32});b.dead=true;count++;}
  }
  if(count>0){G.score+=pts*count;if(cfg.scorePop)popScore(W/2,H*.38,pts*count,1);Sfx.convert();}
}

function triggerWarn(){
  G.state='warn';G.warnF=K.WARN_F;
  G.eB.forEach(b=>b.dead=true);
  showMsg('WARNING',9999);shake(12,80);Sfx.warn();
}

function spawnBoss(){
  const def=BOSS_DEFS[(G.stage-1)%BOSS_DEFS.length];
  G.boss={...def,x:W/2-def.w/2,y:-def.h-50,maxHp:def.hp,ph:0,
    spellPhase:false,currentSpell:-1,spellCooldown:0,
    spellTimeLeft:0,spellFailed:false,
    sCD:40,mt:0,anim:0,flash:0,
    usedSpells:new Set()};
  G.state='play';G.warnF=0;G.ens=[];G.msg={t:'',f:0};
  $('spell-timer-bar').style.display='none';
  const si=def.spells[0];
  G.boss.currentSpell=si;
  G.boss.usedSpells.add(si);
  G.boss.spellPhase=true;
  G.boss.spellTimeLeft=SPELL_CARDS[si].time;
  G.boss.spellFailed=false;
  activateSpell(si);
  showMsg(def.name,2500);Sfx.boss();
}

/* UPDATE */
function update(){
  if(G.state==='pause'||G.state==='dead'||G.state==='countdown')return;
  if(G.shF>0){G.shF--;if(!G.shF){G.shX=0;G.shY=0;}}
  if(G.flashA>0)G.flashA=Math.max(0,G.flashA-.05);
  if(G.msg.f>0){G.msg.f--;if(!G.msg.f)G.msg.t='';}
  if(G.banner.f>0){G.banner.f--;if(!G.banner.f)G.banner.t='';}
  if(G.deathbombF>0)G.deathbombF--;
  for(let i=G.convertPts.length-1;i>=0;i--){G.convertPts[i].life--;if(G.convertPts[i].life<=0)G.convertPts.splice(i,1);}
  if(G.score>=G.extendThresh){
    G.life++;G.extendThresh+=K.EXT_SCORE;
    showMsg('EXTEND!',2000);Sfx.extend();shake(6,12);refreshBombUI();
  }
  if(G.state==='warn'){if(--G.warnF<=0)spawnBoss();tickStars();tickBullets();tickParts();return;}
  if(G.state==='clear'){if(++G.clearF>150)finishClear();tickStars();tickBullets();tickParts();return;}
  tickPlayer();tickStage();tickEnemies();tickBoss();
  tickBullets();tickPickups();checkCols();tickStars();tickParts();
  if(G.bombCD>0)G.bombCD--;
  if(G.combo>0&&++G.comboF>=K.COMBO_DEC){G.combo=Math.max(0,G.combo-1);G.comboF=0;}
}

function tickPlayer(){
  const spd=inp.slow?1.8:4.6;
  if(inp.left)G.px-=spd;if(inp.right)G.px+=spd;
  if(inp.up)G.py-=spd;if(inp.down)G.py+=spd;
  G.px=clamp(G.px,0,W-24);G.py=clamp(G.py,K.TOP,H-24-K.BOT);
  if(G.invuln>0)G.invuln--;
  const now=Date.now();
  if(now-G.lastFire>K.FIRE_MS){playerShoot();G.lastFire=now;}
}

function playerShoot(){
  const lv=Math.min(4,Math.floor(G.power/80));
  const cx=G.px+12;
  for(let i=-lv;i<=lv;i++){
    const b=bGet();b.x=cx+i*8;b.y=G.py;b.vx=i*.32;b.vy=-15;
    b.r=3;b.c='#fff';b.cc='#fff';b.rim='#88aaff';b.homing=false;b.grazed=false;b.dead=false;
    b.type='knife';b.age=0;b.ax=0;b.ay=0;b.delay=0;b.rot=0;b.rotSpd=0;
    b.curl=0;b.accel=1;b.waveAmp=0;b.waveFreq=0;b.wavePhase=0;
    G.pB.push(b);
  }
  if(lv>=2){
    for(const sx of[-20,20]){
      const b=bGet();b.x=cx+sx;b.y=G.py+6;b.vx=sx>0?.7:-.7;b.vy=-12;
      b.r=2.5;b.c='rgba(160,180,255,.55)';b.cc='#aabbff';b.rim='#fff';b.homing=false;b.grazed=false;b.dead=false;
      b.type='ball';b.age=0;b.ax=0;b.ay=0;b.delay=0;b.rot=0;b.rotSpd=0;
      b.curl=0;b.accel=1;b.waveAmp=0;b.waveFreq=0;b.wavePhase=0;
      G.pB.push(b);
    }
  }
  if(lv>=4&&G.lastFire%160<20){
    const b=bGet();b.x=cx;b.y=G.py+4;b.vx=0;b.vy=-9;
    b.r=4;b.c='rgba(200,220,255,.7)';b.cc='#ccddff';b.rim='#aabbff';b.homing=true;b.str=.08;b.grazed=false;b.dead=false;
    b.type='ball';b.age=0;b.ax=0;b.ay=0;b.delay=0;b.rot=0;b.rotSpd=0;
    b.curl=0;b.accel=1;b.waveAmp=0;b.waveFreq=0;b.wavePhase=0;
    G.pB.push(b);
  }
  Sfx.shoot();
}

function tickStage(){
  if(G.boss||G.state==='warn')return;
  G.stageF++;
  if(--G.formF<=0)spawnFormation();
  if(G.stageF>=K.STAGE_SEC*60&&!G.ens.length)triggerWarn();
}

function tickEnemies(){
  for(let i=G.ens.length-1;i>=0;i--){
    const e=G.ens[i];
    e.formTimer++;
    if(e.flash>0)e.flash--;
    switch(e.role){
      case'follow_sine':
        e.y+=e.vy*G.diffMult*G.spdMult;
        e.x=e.baseX+Math.sin(e.formTimer*.025+e.phase)*40;
        break;
      case'follow_arc':
        e.y+=e.vy*G.diffMult*G.spdMult;
        e.x+=e.arcDir*Math.cos(e.phase*.012)*1.8*G.diffMult;
        e.phase++;
        break;
      case'hold':
      default:
        e.x+=e.vx*G.diffMult*G.spdMult;
        e.y+=e.vy*G.diffMult*G.spdMult;
        if(e.y>100){e.vy=lerp(e.vy,.32,.04);e.vx=lerp(e.vx,0,.03);}
        break;
    }
    if(--e.cd<=0){
      doNormalShoot(e.key,e.x+e.w/2,e.y+e.h/2,e.pals,K.BSPD*G.spdMult);
      e.cd=K.E_CD+rnd(K.E_CDV);
    }
    if(e.y>H+100||e.x<-120||e.x>W+120)G.ens.splice(i,1);
  }
}

function tickBoss(){
  const b=G.boss;if(!b)return;
  if(b.y<82)b.y+=1.8;
  else{b.mt+=.015;b.x=W/2-b.w/2+Math.sin(b.mt)*90+Math.sin(b.mt*1.7)*28;}
  b.anim+=.04;
  if(b.flash>0)b.flash--;
  if(b.spellPhase&&b.spellTimeLeft>0){
    b.spellTimeLeft--;
    if(b.spellTimeLeft<=0&&!b.spellFailed){
      b.spellFailed=true;G.spellBonus=0;
      showMsg('SPELL FAILED',1800);
      $('spell-timer-fill').style.background='rgba(255,80,60,.7)';
    }
  }
  const pct=b.hp/b.maxHp*100;
  const ph=BOSS_DEFS[(G.stage-1)%BOSS_DEFS.length].phases;
  const np=ph.length>1&&pct<=ph[1].pct?1:0;
  if(np!==b.ph){
    b.ph=np;
    const def=BOSS_DEFS[(G.stage-1)%BOSS_DEFS.length];
    const availSpells=def.spells.filter(idx=>!b.usedSpells.has(idx));
    if(availSpells.length>0){
      const si=availSpells[0];
      b.currentSpell=si;b.usedSpells.add(si);
      b.spellPhase=true;b.spellTimeLeft=SPELL_CARDS[si].time;b.spellFailed=false;
      activateSpell(si);b.sCD=50;
    }
    shake(10,18);G.flashA=.3;
    spawnParts(b.x+b.w/2,b.y+b.h/2,'#ffffff',18,4,28);
    Sfx.phase();
  }
  if(--b.sCD<=0){
    if(b.y>0){
      const ex=b.x+b.w/2,ey=b.y+b.h/2;
      if(b.spellPhase&&b.currentSpell>=0){
        G.spellTimer++;
        const fn=SPELL_CARDS[b.currentSpell].fn;
        if(SpellFire[fn])SpellFire[fn](ex,ey,K.BSPD*G.spdMult);
      }else{
        const def=BOSS_DEFS[(G.stage-1)%BOSS_DEFS.length];
        const pat=def.phases[b.ph].pat;
        doNormalShoot(pat[Math.floor(G.stageF/80)%pat.length],ex,ey,[rPal(),rPal()],K.BSPD*G.spdMult);
      }
    }
    const def=BOSS_DEFS[(G.stage-1)%BOSS_DEFS.length];
    const cp=def.phases[b.ph];
    b.sCD=cp.cd[0]+rnd(cp.cd[1]-cp.cd[0]);
  }
}

/* ====== ENHANCED BULLET TICK ====== */
function tickBullets(){
  const px=G.px+12,py=G.py+12;
  /* 自機 homing */
  for(const b of G.pB){
    if(b.homing){
      let bx=W/2,by=K.TOP+50;let bd=999;
      for(const e of G.ens){const ex=e.x+e.w/2,ey=e.y+e.h/2,d2=(ex-b.x)**2+(ey-b.y)**2;if(d2<bd){bd=d2;bx=ex;by=ey;}}
      if(G.boss&&G.boss.y>0){bx=G.boss.x+G.boss.w/2;by=G.boss.y+G.boss.h/2;}
      const dx=bx-b.x,dy=by-b.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d>5){b.vx+=dx/d*b.str;b.vy+=dy/d*b.str;}
    }
    b.x+=b.vx;b.y+=b.vy;b.age++;
  }

  for(const b of G.eB){
    if(b.dead){b.r=Math.max(0,b.r-.35);continue;}
    b.age++;
    if(b.delay>0){b.delay--;continue;}

    /* homing */
    if(b.homing){
      const dx=px-b.x,dy=py-b.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d>5){b.vx+=dx/d*b.str;b.vy+=dy/d*b.str;const sp=Math.sqrt(b.vx*b.vx+b.vy*b.vy),mx=4.2*K.BSPD;if(sp>mx){b.vx=b.vx/sp*mx;b.vy=b.vy/sp*mx;}}
    }

    /* curl（速度ベクトルを回転） */
    if(b.curl!==0){
      const cos=Math.cos(b.curl),sin=Math.sin(b.curl);
      const nvx=b.vx*cos-b.vy*sin;
      const nvy=b.vx*sin+b.vy*cos;
      b.vx=nvx;b.vy=nvy;
    }

    /* accel（速度スカラーを倍率で加速、上限あり） */
    if(b.accel!==1){
      const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
      const newSpd=Math.min(spd*b.accel,8);
      if(spd>0.01){b.vx=b.vx/spd*newSpd;b.vy=b.vy/spd*newSpd;}
    }

    /* wave（速度方向と垂直にsin波） */
    if(b.waveAmp!==0){
      const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
      if(spd>0.01){
        const nx=-b.vy/spd,ny=b.vx/spd;/* 法線 */
        const wave=Math.sin(b.age*b.waveFreq+b.wavePhase)*b.waveAmp*.04;
        b.x+=nx*wave;b.y+=ny*wave;
      }
    }

    b.vx+=b.ax;b.vy+=b.ay;
    if(b.rotSpd)b.rot+=b.rotSpd;
    b.x+=b.vx;b.y+=b.vy;
  }

  for(let i=G.pB.length-1;i>=0;i--)if(G.pB[i].y<-40||G.pB[i].x<-40||G.pB[i].x>W+40)bRet(G.pB.splice(i,1)[0]);
  for(let i=G.eB.length-1;i>=0;i--){
    const b=G.eB[i];
    if((b.dead&&b.r<=0)||b.y>H+90||b.y<-90||b.x<-90||b.x>W+90)bRet(G.eB.splice(i,1)[0]);
  }
}

function tickPickups(){
  const px=G.px+12,py=G.py+12;
  const autoCol=G.py<H*.22;
  for(const p of G.pus){
    const dx=px-p.x,dy=py-p.y,d=Math.sqrt(dx*dx+dy*dy);
    if(autoCol||d<180){p.x+=dx/d*7;p.y+=dy/d*7;}else p.y+=1.8;
    p.t++;
  }
  G.pus=G.pus.filter(p=>p.y<H+28);
}

function tickStars(){
  const slow=inp.slow;
  for(const s of G.stars){s.y+=s.vy*(slow?.55:1);if(s.y>H+4){s.y=-4;s.x=rnd(W);}}
}

/* 衝突判定 */
function checkCols(){
  for(let i=G.pB.length-1;i>=0;i--){
    const pb=G.pB[i];let hit=false;
    for(let j=G.ens.length-1;!hit&&j>=0;j--){
      const e=G.ens[j];
      if(pb.x>e.x&&pb.x<e.x+e.w&&pb.y>e.y&&pb.y<e.y+e.h){
        e.hp--;e.flash=3;hit=true;
        if(e.hp<=0){
          const mult=Math.min(1+G.combo*.08,K.COMBO_MAX);
          G.score+=Math.floor(e.sc*mult);G.combo++;if(G.combo>G.maxCombo)G.maxCombo=G.combo;
          G.comboF=0;G.killed++;G.power=Math.min(K.MAX_POW,G.power+K.POW_K);
          if(Math.random()<K.DROP)G.pus.push({x:e.x+e.w/2,y:e.y,type:Math.random()<.65?'power':'bomb',t:0});
          if(cfg.scorePop)popScore(e.x+e.w/2,e.y,Math.floor(e.sc*mult),mult);
          spawnParts(e.x+e.w/2,e.y+e.h/2,e.pals[0].ball,10,3,18);
          spawnRing(e.x+e.w/2,e.y+e.h/2,e.pals[0].ball);
          G.ens.splice(j,1);Sfx.explode();
        }
      }
    }
    if(!hit&&G.boss&&G.boss.y>0){
      const b=G.boss;
      if(pb.x>b.x&&pb.x<b.x+b.w&&pb.y>b.y&&pb.y<b.y+b.h){
        b.hp-=DIFF[cfg.difficulty].bDmg;b.flash=3;hit=true;
        if(b.spellPhase&&!b.spellFailed){b.spellFailed=true;G.spellBonus=0;showMsg('SPELL FAILED',1000);}
        spawnParts(pb.x,pb.y,PALETTE.white.ball,2,2,8);
        if(b.hp<=0)bossDown();
      }
    }
    if(hit)bRet(G.pB.splice(i,1)[0]);
  }

  if(G.invuln<=0){
    const px=G.px+12,py=G.py+12;
    const hr=inp.slow?K.HIT_S:K.HIT_N;
    for(let i=G.eB.length-1;i>=0;i--){
      const b=G.eB[i];if(b.dead||b.delay>0)continue;
      const dx=b.x-px,dy=b.y-py,d2=dx*dx+dy*dy;
      if(d2<(hr+b.r)*(hr+b.r)){
        if(G.deathbombF>0&&G.bombs>0){
          G.deathbombF=0;useBomb(true);
          bRet(G.eB.splice(i,1)[0]);
          Sfx.deathbomb();
          $('deathbomb-flash').style.background='rgba(255,200,80,.45)';
          setTimeout(()=>{$('deathbomb-flash').style.background='rgba(255,200,80,0)';},100);
          continue;
        }
        onHit();bRet(G.eB.splice(i,1)[0]);continue;
      }
      const gr=K.GRAZE_R+b.r;
      if(!b.grazed&&d2<gr*gr){b.grazed=true;G.graze++;G.score+=K.GRAZE_PT;spawnGrazeRing(px,py);Sfx.graze();}
      if(b.grazed&&d2>=gr*gr*1.6)b.grazed=false;
    }
    for(const e of G.ens)if(G.px+12>e.x&&G.px+12<e.x+e.w&&G.py+12>e.y&&G.py+12<e.y+e.h)onHit();
  }

  const px=G.px+12,py=G.py+12;
  const oldPow=Math.floor(G.power/80);
  for(let i=G.pus.length-1;i>=0;i--){
    const p=G.pus[i];const dx=p.x-px,dy=p.y-py;
    if(dx*dx+dy*dy<900){
      if(p.type==='power'){
        G.power=Math.min(K.MAX_POW,G.power+20);
        if(Math.floor(G.power/80)>oldPow){showMsg('POWER UP',1200);Sfx.powerup();}
        if(G.power===K.MAX_POW&&oldPow<Math.floor(K.MAX_POW/80)){showMsg('MAX POWER',1800);Sfx.powerMax();}
      }else{
        const maxB=DIFF[cfg.difficulty].maxBomb;
        if(G.bombs<maxB){G.bombs++;refreshBombUI();showMsg('BOMB GET',1400);Sfx.powerup();}
        else{G.score+=500;if(cfg.scorePop)popScore(p.x,p.y,500,1);}
      }
      G.pus.splice(i,1);
    }
  }
}

function onHit(){
  G.deathbombF=K.DEATHBOMB_F;
  G.life--;G.invuln=K.INVULN;
  const powLoss=G.power>=80?80:G.power;
  G.power=Math.max(0,G.power-powLoss);
  G.combo=0;G.comboF=0;shake(8,16);G.flashA=.38;Sfx.hit();
  inp.slow=false;$('bs').classList.remove('on');
  if(G.life<=0){gameDead();return;}
  if(G.boss&&G.boss.spellPhase&&!G.boss.spellFailed){
    G.boss.spellFailed=true;G.spellBonus=0;showMsg('SPELL FAILED',1000);
  }
}

function useBomb(isDeathBomb){
  if(G.bombs<=0||G.bombCD>0||G.state!=='play')return;
  G.bombs--;G.bombCD=isDeathBomb?K.BOMB_INV:K.BOMB_F;
  convertBullets();
  spawnParts(G.px+12,G.py+12,'rgba(255,220,80,.9)',30,5.5,38);
  for(let i=G.ens.length-1;i>=0;i--){
    const e=G.ens[i];
    spawnParts(e.x+e.w/2,e.y+e.h/2,e.pals[0].ball,8,3,20);
    spawnRing(e.x+e.w/2,e.y+e.h/2,e.pals[0].ball);
    const bd=22;e.hp-=bd;if(e.hp<=0){G.killed++;G.ens.splice(i,1);}
  }
  if(G.boss){G.boss.hp-=isDeathBomb?100:120;if(G.boss.hp<=0)bossDown();}
  G.invuln=isDeathBomb?K.BOMB_INV:200;G.flashA=.42;shake(14,24);
  showMsg(isDeathBomb?'DEATHBOMB':'BOMB',1200);Sfx.bomb();refreshBombUI();
}

function bossDown(){
  const b=G.boss;
  if(b.spellPhase&&!b.spellFailed&&G.spellBonus>0){
    G.totalSpellBonus+=G.spellBonus;G.score+=G.spellBonus;
    if(cfg.scorePop)popScore(W/2,H*.35,G.spellBonus,1);
    showMsg('SPELL BONUS! +'+G.spellBonus.toLocaleString(),2000);Sfx.spellBonus();
  }
  G.score+=b.sc;
  const bx=b.x+b.w/2,by=b.y+b.h/2;
  spawnParts(bx,by,PALETTE.white.ball,50,5.5,50);
  for(let i=0;i<6;i++)setTimeout(()=>spawnRing(bx,by,PALETTE[PAL_KEYS[i]].ball),i*65);
  shake(20,30);G.flashA=.5;Sfx.bigBang();
  convertBullets();
  G.boss=null;bRetAll(G.eB);
  $('spell-timer-bar').style.display='none';
  stageClear();
}

function stageClear(){
  G.state='clear';G.clearF=0;
  const bonus=G.life*300+G.graze*3;G.score+=bonus;
  showMsg('CLEAR  +'+bonus.toLocaleString(),9999);Sfx.clear();
  const d=DIFF[cfg.difficulty];
  if(d.recover&&G.life<d.life)G.life=Math.min(d.life,G.life+1);
}

function finishClear(){
  G.msg={t:'',f:0};
  if(G.stage>=K.MAX_STAGE){gameComplete();return;}
  G.stage++;G.stageF=0;G.diffMult=1+(G.stage-1)*DIFF[cfg.difficulty].growth;
  G.formF=60;
  showBanner('STAGE '+G.stage);G.state='countdown';
  startCountdown(()=>{G.state='play';});
}

function gameDead(){
  G.state='dead';teardown();
  const acc=G.spawned?Math.round(G.killed/G.spawned*100):0;
  showResult('GAME OVER','red',grade(acc),acc);refreshSysBar();
}
function gameComplete(){
  G.state='dead';teardown();
  const acc=G.spawned?Math.round(G.killed/G.spawned*100):0;
  showResult('ALL CLEAR','grn','S',acc);refreshSysBar();
}
function grade(acc){
  const s=acc+G.stage*20+G.maxCombo*2+Math.floor(G.graze/8)+Math.floor(G.totalSpellBonus/5000);
  return s>=180?'S':s>=140?'A':s>=100?'B':s>=65?'C':'D';
}
function showResult(title,cls,gr,acc){
  hs=Store.addHS(hs,{score:G.score,stage:G.stage,combo:G.maxCombo,graze:G.graze,acc});
  $('r-title').textContent=title;$('r-title').className=cls;$('r-grade').textContent=gr;
  $('r-score').textContent=G.score.toLocaleString();$('r-stage').textContent=G.stage;
  $('r-combo').textContent=G.maxCombo;$('r-graze').textContent=G.graze;
  $('r-spell').textContent=G.totalSpellBonus.toLocaleString();
  $('r-acc').textContent=acc+'%';
  show('o-result');
}

function startCountdown(cb){
  const ov=$('o-count'),num=$('count-num');ov.style.display='flex';
  let n=3;
  function tick(){
    num.classList.remove('show','go');void num.offsetWidth;
    num.textContent=n>0?String(n):'GO';num.classList.add('show');
    if(n===0)num.classList.add('go');
    if(n>0)Sfx.countdown();else Sfx.go();
    n--;if(n>=-1)setTimeout(tick,700);else{ov.style.display='none';cb();}
  }
  tick();
}

/* ====== DRAW ====== */
function draw(){
  ctx.save();
  ctx.translate(Math.round(G.shX),Math.round(G.shY));
  ctx.fillStyle='#000';ctx.fillRect(-16,-16,W+32,H+32);

  /* 星 */
  for(const s of G.stars){
    const a=s.a*(1+Math.sin(Date.now()*.001+s.phase)*.3);
    ctx.globalAlpha=a;ctx.fillStyle='#fff';ctx.fillRect(s.x,s.y,s.r,s.r);
  }
  ctx.globalAlpha=1;

  for(const p of G.pus){
    const c=p.type==='power'?'rgba(80,200,255,.85)':'rgba(255,150,40,.85)';
    const s=4+Math.sin(p.t*.12)*.6;
    ctx.strokeStyle=c;ctx.lineWidth=1.4;
    ctx.beginPath();ctx.moveTo(p.x-s,p.y);ctx.lineTo(p.x+s,p.y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(p.x,p.y-s);ctx.lineTo(p.x,p.y+s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(p.x,p.y-s*.7);ctx.lineTo(p.x+s*.7,p.y);ctx.lineTo(p.x,p.y+s*.7);ctx.lineTo(p.x-s*.7,p.y);ctx.closePath();ctx.stroke();
  }

  for(const c of G.convertPts){
    const a=c.life/32;ctx.globalAlpha=a*.8;
    ctx.fillStyle='rgba(255,255,120,1)';
    const r=3*(1-a)+1;
    ctx.beginPath();ctx.arc(c.x,c.y,r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  for(const p of G.parts){
    const a=p.life/p.maxLife;
    if(p.type==='dot'){ctx.globalAlpha=a*.88;ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r*a,0,Math.PI*2);ctx.fill();}
    else if(p.type==='ring'){ctx.globalAlpha=a*.65;ctx.strokeStyle=p.c;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.stroke();}
  }
  ctx.globalAlpha=1;

  for(const r of G.grazeRings){
    const a=r.life/r.maxLife;ctx.globalAlpha=a*.55;ctx.strokeStyle='rgba(255,255,160,.9)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke();
  }
  ctx.globalAlpha=1;

  drawEnemies();
  drawBoss();

  /* 自機弾 */
  for(const b of G.pB){
    const alpha=b.c.includes('rgba')?.5:1;
    ctx.globalAlpha=alpha;
    ctx.fillStyle='#aaccff';ctx.fillRect(b.x-1.5,b.y-3,3,7);
    ctx.fillStyle='#fff';ctx.fillRect(b.x-1,b.y-2,2,5);
  }
  ctx.globalAlpha=1;

  drawEnemyBullets();

  if(G.invuln%4<2||G.invuln===0)drawPlayer();

  if(inp.slow){
    ctx.strokeStyle='rgba(255,255,255,.16)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(G.px+12,G.py+12,12,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(255,80,80,.95)';
    ctx.beginPath();ctx.arc(G.px+12,G.py+12,2.2,0,Math.PI*2);ctx.fill();
    const lv=Math.min(4,Math.floor(G.power/80));
    if(lv>=2){
      for(const sx of[-20,20]){
        ctx.fillStyle='rgba(180,200,255,.35)';
        ctx.beginPath();ctx.arc(G.px+12+sx,G.py+6,3.5,0,Math.PI*2);ctx.fill();
      }
    }
  }

  if(G.flashA>0){ctx.globalAlpha=G.flashA;ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}

  ctx.restore();
  drawHUD();
}

function drawEnemies(){
  for(const e of G.ens){
    const col=e.flash>0?'rgba(255,255,255,.9)':e.pals[0].ball;
    ctx.save();ctx.translate(e.x+e.w/2,e.y+e.h/2);
    ctx.strokeStyle=col;ctx.lineWidth=1.2;ctx.globalAlpha=.7;
    ctx.beginPath();ctx.arc(0,0,e.w*.58,0,Math.PI*2);ctx.stroke();
    ctx.rotate(e.formTimer*.03);ctx.globalAlpha=1;
    ctx.strokeStyle=col;ctx.lineWidth=1.3;
    ctx.strokeRect(-e.w/2,-e.h/2,e.w,e.h);
    ctx.rotate(-e.formTimer*.055);
    ctx.fillStyle=e.pals[1]?e.pals[1].core:'#fff';ctx.globalAlpha=.7;
    ctx.beginPath();ctx.arc(0,0,e.w*.24,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    ctx.restore();
    if(e.hp<e.maxHp){
      ctx.fillStyle='rgba(255,255,255,.05)';ctx.fillRect(e.x,e.y-5,e.w,2);
      ctx.fillStyle=e.pals[0].ball;ctx.fillRect(e.x,e.y-5,e.w*(e.hp/e.maxHp),2);
    }
  }
  ctx.globalAlpha=1;
}

function drawBoss(){
  const b=G.boss;if(!b||b.y<-b.h)return;
  const bc=b.flash>0?'rgba(255,255,255,.85)':'rgba(255,255,255,.92)';
  if(b.spellPhase&&b.currentSpell>=0){
    const pal=PALETTE[PAL_KEYS[b.currentSpell%PAL_KEYS.length]];
    const pulse=.12+Math.sin(b.anim*2.4)*.08;
    ctx.globalAlpha=pulse;ctx.fillStyle=pal.ball;
    ctx.beginPath();ctx.arc(b.x+b.w/2,b.y+b.h/2,b.w/2+24+Math.sin(b.anim)*8,0,Math.PI*2);ctx.fill();
    for(let r=0;r<2;r++){
      const ra=b.w/2+18+r*16+Math.sin(b.anim*(1+r*.5))*5;
      ctx.globalAlpha=(.08-r*.03)+Math.sin(b.anim+r)*.03;
      ctx.strokeStyle=pal.ball;ctx.lineWidth=1+r*.5;
      ctx.beginPath();ctx.arc(b.x+b.w/2,b.y+b.h/2,ra,0,Math.PI*2);ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
  ctx.strokeStyle=bc;ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(b.x+b.w/2,b.y+b.h/2,b.w/2,0,Math.PI*2);ctx.stroke();
  ctx.save();ctx.translate(b.x+b.w/2,b.y+b.h/2);
  ctx.rotate(b.anim*.8);ctx.strokeStyle=bc;ctx.lineWidth=1.8;
  ctx.strokeRect(-b.w*.44,-b.h*.44,b.w*.88,b.h*.88);
  ctx.rotate(b.anim*.4+Math.PI/4);ctx.globalAlpha=.5;
  ctx.strokeRect(-b.w*.3,-b.h*.3,b.w*.6,b.h*.6);
  ctx.globalAlpha=1;ctx.restore();
  const bw=Math.min(W*.52,440),bx=(W-bw)/2,by2=K.TOP+10;
  ctx.fillStyle='rgba(255,255,255,.05)';ctx.fillRect(bx,by2,bw,5);
  const pct=b.hp/b.maxHp;
  const hc=b.spellPhase&&!b.spellFailed?
    (PALETTE[PAL_KEYS[b.currentSpell>=0?b.currentSpell%PAL_KEYS.length:0]].ball):
    'rgba(255,255,255,.6)';
  ctx.fillStyle=hc;ctx.fillRect(bx,by2,bw*pct,5);
  ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='.38rem \'DM Mono\'';
  ctx.textBaseline='bottom';ctx.fillText(b.name,W/2,K.TOP+10);
  if(b.spellPhase&&b.currentSpell>=0){
    const sp=SPELL_CARDS[b.currentSpell];
    ctx.fillStyle='rgba(255,220,80,.28)';ctx.font='.3rem \'DM Mono\'';
    ctx.fillText(sp.sub,W/2,K.TOP+22);
  }
  ctx.textBaseline='alphabetic';
}

/* ====== 弾描画（東方風強化版） ====== */
function drawEnemyBullets(){
  for(const b of G.eB){
    if(b.delay>0)continue;
    const a=b.dead?Math.max(0,b.r/9):.88;
    if(a<=0)continue;
    ctx.globalAlpha=a;
    const x=b.x,y=b.y,r=b.r;
    switch(b.type){
      case'ball':
        /* 外縁グロー */
        ctx.fillStyle=b.c;
        ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
        /* コアハイライト */
        ctx.fillStyle=b.cc||'#fff';
        ctx.beginPath();ctx.arc(x-r*.28,y-r*.28,r*.38,0,Math.PI*2);ctx.fill();
        break;

      case'large':
        /* グロー外周 */
        const lg=ctx.createRadialGradient(x,y,r*.2,x,y,r);
        lg.addColorStop(0,b.cc||'#fff');
        lg.addColorStop(0.5,b.c);
        lg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=lg;
        ctx.beginPath();ctx.arc(x,y,r*1.3,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=b.cc||'#fff';
        ctx.beginPath();ctx.arc(x,y,r*.35,0,Math.PI*2);ctx.fill();
        break;

      case'bubble':
        ctx.strokeStyle=b.c;ctx.lineWidth=1.5;
        ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();
        /* 反射光 */
        ctx.fillStyle=b.cc||'#fff';ctx.globalAlpha=a*.3;
        ctx.beginPath();ctx.arc(x-r*.32,y-r*.32,r*.32,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=a;
        break;

      case'rice':{
        const ang=Math.atan2(b.vy,b.vx)+b.rot;
        ctx.save();ctx.translate(x,y);ctx.rotate(ang);
        /* 本体 */
        ctx.fillStyle=b.c;ctx.beginPath();ctx.ellipse(0,0,r*2.4,r*.72,0,0,Math.PI*2);ctx.fill();
        /* ハイライト */
        ctx.fillStyle=b.cc||'#fff';ctx.globalAlpha=a*.7;
        ctx.beginPath();ctx.ellipse(-r*.3,0,r*.85,r*.24,0,0,Math.PI*2);ctx.fill();
        ctx.restore();break;}

      case'knife':{
        const ang=Math.atan2(b.vy,b.vx);
        ctx.save();ctx.translate(x,y);ctx.rotate(ang);
        /* グラデーション刃 */
        const kg=ctx.createLinearGradient(-r*1.6,0,r*3.2,0);
        kg.addColorStop(0,'rgba(0,0,0,0)');
        kg.addColorStop(0.3,b.c);
        kg.addColorStop(1,b.cc||'#fff');
        ctx.fillStyle=kg;
        ctx.beginPath();ctx.moveTo(r*3.2,0);ctx.lineTo(-r*1.6,r*.65);ctx.lineTo(-r*1.6,-r*.65);ctx.closePath();ctx.fill();
        /* エッジライン */
        ctx.strokeStyle=b.cc||'#fff';ctx.lineWidth=.6;ctx.globalAlpha=a*.5;
        ctx.beginPath();ctx.moveTo(r*3.0,0);ctx.lineTo(-r*1.4,r*.55);ctx.stroke();
        ctx.beginPath();ctx.moveTo(r*3.0,0);ctx.lineTo(-r*1.4,-r*.55);ctx.stroke();
        ctx.restore();break;}

      case'star':{
        ctx.save();ctx.translate(x,y);ctx.rotate(b.rot);
        /* グロー */
        ctx.fillStyle=b.c;ctx.globalAlpha=a*.4;
        ctx.beginPath();ctx.arc(0,0,r*1.3,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=a;
        /* 星本体 */
        ctx.fillStyle=b.c;ctx.beginPath();
        for(let i=0;i<5;i++){
          const a0=(Math.PI*2/5)*i-Math.PI/2;
          const a1=a0+Math.PI/5;
          if(i===0)ctx.moveTo(Math.cos(a0)*r,Math.sin(a0)*r);
          else ctx.lineTo(Math.cos(a0)*r,Math.sin(a0)*r);
          ctx.lineTo(Math.cos(a1)*r*.42,Math.sin(a1)*r*.42);
        }
        ctx.closePath();ctx.fill();
        /* センターハイライト */
        ctx.fillStyle=b.cc||'#fff';ctx.globalAlpha=a*.8;
        ctx.beginPath();ctx.arc(0,0,r*.28,0,Math.PI*2);ctx.fill();
        ctx.restore();break;}

      case'oval':{
        const ang=Math.atan2(b.vy,b.vx)+b.rot;
        ctx.save();ctx.translate(x,y);ctx.rotate(ang+Math.PI/2);
        ctx.fillStyle=b.c;ctx.beginPath();ctx.ellipse(0,0,r*.65,r*1.5,0,0,Math.PI*2);ctx.fill();
        /* ハイライト */
        ctx.fillStyle=b.cc||'#fff';ctx.globalAlpha=a*.6;
        ctx.beginPath();ctx.ellipse(-r*.18,0,r*.22,r*.55,0,0,Math.PI*2);ctx.fill();
        ctx.restore();break;}

      default:
        ctx.fillStyle=b.c;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.globalAlpha=1;
}

function drawPlayer(){
  const x=G.px,y=G.py;
  const lv=Math.min(4,Math.floor(G.power/80));
  ctx.fillStyle=`rgba(100,160,255,${.07+lv*.02})`;
  ctx.beginPath();ctx.moveTo(x+12,y+22);ctx.lineTo(x+4,y+28);ctx.lineTo(x+12,y+24);ctx.lineTo(x+20,y+28);ctx.closePath();ctx.fill();
  ctx.fillStyle='#ffffff';ctx.globalAlpha=.85+lv*.03;
  ctx.beginPath();ctx.moveTo(x+12,y+1);ctx.lineTo(x+22,y+20);ctx.lineTo(x+12,y+15);ctx.lineTo(x+2,y+20);ctx.closePath();ctx.fill();
  if(lv>=2){
    ctx.fillStyle='rgba(180,210,255,.55)';
    for(const sx of[-18,18]){ctx.beginPath();ctx.arc(x+12+sx,y+13,3.5,0,Math.PI*2);ctx.fill();}
  }
  if(lv>=4){
    ctx.fillStyle='rgba(160,200,255,.35)';
    for(const sx of[-28,28]){ctx.beginPath();ctx.arc(x+12+sx,y+16,3,0,Math.PI*2);ctx.fill();}
  }
  ctx.globalAlpha=1;
}

function drawHUD(){
  const T=K.TOP;
  ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,W,T);
  ctx.fillStyle='rgba(255,255,255,.04)';ctx.fillRect(0,T,W,1);
  ctx.textBaseline='middle';

  ctx.textAlign='left';ctx.fillStyle='rgba(255,255,255,.24)';ctx.font='.38rem \'DM Mono\'';
  ctx.fillText('SCORE',12,T*.28);
  ctx.fillStyle='rgba(255,255,255,.88)';ctx.font='400 .82rem \'DM Mono\'';
  ctx.fillText(G.score.toLocaleString(),12,T*.72);

  ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.22)';ctx.font='.38rem \'DM Mono\'';
  ctx.fillText('STAGE',W/2,T*.28);
  ctx.fillStyle='rgba(255,255,255,.88)';ctx.font='300 .88rem \'DM Mono\'';
  ctx.fillText(G.stage+' / '+K.MAX_STAGE,W/2,T*.72);

  ctx.textAlign='right';ctx.fillStyle='rgba(255,255,255,.22)';ctx.font='.38rem \'DM Mono\'';
  ctx.fillText('LIFE',W-12,T*.28);
  const dotR=3.8,dotGap=10,dotY=T*.72;
  for(let i=0;i<G.life;i++){
    const dx=W-12-i*dotGap;
    ctx.fillStyle=G.life<=2?'rgba(255,70,40,.95)':'rgba(255,255,255,.88)';
    ctx.beginPath();ctx.arc(dx,dotY,dotR,0,Math.PI*2);ctx.fill();
  }

  const lv=Math.min(4,Math.floor(G.power/80));
  const pw=G.power/K.MAX_POW;
  const pgw=70,pgx=W-12-pgw,pgy=T*.88+10;
  ctx.fillStyle='rgba(255,255,255,.06)';ctx.fillRect(pgx,pgy,pgw,2);
  ctx.fillStyle=G.power>=K.MAX_POW?'rgba(180,220,255,1)':'rgba(140,180,255,.7)';
  ctx.fillRect(pgx,pgy,pgw*pw,2);
  ctx.fillStyle='rgba(255,255,255,.28)';ctx.font='.36rem \'DM Mono\'';
  ctx.fillText('LV'+lv,W-12,T*.6+2);

  if(!G.boss&&G.state!=='warn'){
    const pct=Math.max(0,1-G.stageF/(K.STAGE_SEC*60));
    ctx.fillStyle='rgba(255,255,255,.04)';ctx.fillRect(0,T+1,W,2);
    ctx.fillStyle='rgba(255,255,255,.24)';ctx.fillRect(0,T+1,W*pct,2);
  }

  if(G.combo>1){
    const intensity=G.combo>=100?.95:G.combo>=50?.8:G.combo>=20?.62:.44;
    ctx.textAlign='center';ctx.fillStyle=`rgba(255,255,255,${intensity})`;
    ctx.font=`300 ${G.combo>=50?.68:.58}rem 'DM Mono'`;
    ctx.textBaseline='middle';ctx.fillText(G.combo+' COMBO',W/2,H*.34);
  }

  if(G.msg.t){
    const a=Math.min(1,G.msg.f/12);
    ctx.textAlign='center';ctx.globalAlpha=a;ctx.fillStyle='#fff';ctx.font='300 .64rem \'DM Mono\'';
    ctx.textBaseline='middle';ctx.fillText(G.msg.t,W/2,H*.42);ctx.globalAlpha=1;
  }
  if(G.banner.t){
    const a=Math.min(1,G.banner.f/18);
    ctx.textAlign='center';ctx.globalAlpha=a;ctx.fillStyle='#fff';
    ctx.font='300 clamp(1.2rem,3.2vmin,1.9rem) \'DM Mono\'';
    ctx.textBaseline='middle';ctx.fillText(G.banner.t,W/2,H*.48);ctx.globalAlpha=1;
  }
  if(G.state==='warn'){
    const p=.36+Math.sin(Date.now()/160)*.46;
    ctx.textAlign='center';ctx.globalAlpha=p;ctx.fillStyle='rgba(255,55,35,1)';
    ctx.font='300 clamp(1rem,2.8vmin,1.7rem) \'DM Mono\'';
    ctx.textBaseline='middle';ctx.fillText('WARNING',W/2,H*.48);ctx.globalAlpha=1;
  }
  ctx.textBaseline='alphabetic';
}

function shake(m,d){if(!cfg.shake)return;G.shF=d;G.shX=(Math.random()-.5)*m*2;G.shY=(Math.random()-.5)*m*2;}
function showMsg(t,ms){G.msg={t,f:Math.round(ms/(1000/60))};}
function showBanner(t){G.banner={t,f:120};}
function refreshBombUI(){
  const maxB=DIFF[cfg.difficulty].maxBomb;
  const pipsEl=$('bomb-pips');pipsEl.innerHTML='';
  for(let i=0;i<maxB;i++){const d=document.createElement('div');d.className='bpip'+(i<G.bombs?' active':'');pipsEl.appendChild(d);}
  $('bn').textContent=G.bombs;
  $('bb').className='btn'+(G.bombs>0?' on':G.bombCD>0?' off':'');
}
function refreshSysBar(){
  const bar=$('sys-bar');
  ['play','warn','clear','countdown'].includes(G.state)?bar.classList.add('dim'):bar.classList.remove('dim');
}
function popScore(x,y,pts,mult){
  const el=document.createElement('div');
  const col=mult>=3?'rgba(255,220,80,.8)':mult>=1.5?'rgba(180,240,255,.75)':'rgba(255,255,255,.55)';
  el.style.cssText=`position:absolute;pointer-events:none;z-index:9;font-family:'DM Mono',monospace;font-size:.56rem;color:${col};left:${x-20}px;top:${y}px;animation:sp .85s ease-out forwards`;
  el.textContent='+'+pts.toLocaleString()+(mult>1.02?' ×'+mult.toFixed(1):'');
  $('root').appendChild(el);setTimeout(()=>el.remove(),860);
  if(!$('sp-s')){const s=document.createElement('style');s.id='sp-s';s.textContent='@keyframes sp{0%{opacity:.7;transform:translateY(0)}100%{opacity:0;transform:translateY(-38px)}}';document.head.appendChild(s);}
}

/* 入力 */
const inp={up:false,down:false,left:false,right:false,slow:false};
let slowId=null,bombId=null;
const _th=[];
function addT(el,ev,fn){el.addEventListener(ev,fn,{passive:false});_th.push({el,ev,fn});}

function setupInput(){
  /* 十字キー（Dパッド） */
  const dpadDirs=[['dp-up','up'],['dp-down','down'],['dp-left','left'],['dp-right','right']];
  for(const[id,dir]of dpadDirs){
    const el=$(id);let tid=null;
    const start=e=>{e.preventDefault();if(tid!==null)return;const t=e.changedTouches[0];tid=t.identifier;inp[dir]=true;el.classList.add('active');};
    const end=e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===tid){tid=null;inp[dir]=false;el.classList.remove('active');}};
    addT(el,'touchstart',start);addT(el,'touchend',end);addT(el,'touchcancel',end);
  }
  const bs_=$('bs');
  addT(bs_,'touchstart',e=>{e.preventDefault();for(const t of e.changedTouches)if(slowId===null){slowId=t.identifier;inp.slow=true;bs_.classList.add('on');}});
  const sEnd=e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===slowId){slowId=null;inp.slow=false;bs_.classList.remove('on');}};
  addT(bs_,'touchend',sEnd);addT(bs_,'touchcancel',sEnd);
  const bb_=$('bb');
  addT(bb_,'touchstart',e=>{e.preventDefault();for(const t of e.changedTouches)if(bombId===null){bombId=t.identifier;useBomb(false);}});
  const bEnd=e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===bombId)bombId=null;};
  addT(bb_,'touchend',bEnd);addT(bb_,'touchcancel',bEnd);
  const KM={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',KeyA:'left',KeyD:'right',KeyW:'up',KeyS:'down'};
  document.addEventListener('keydown',G._kd=e=>{
    if(G.state!=='play')return;
    if(KM[e.code]){e.preventDefault();inp[KM[e.code]]=true;}
    if(e.code==='KeyX'||e.code==='Space'){e.preventDefault();useBomb(false);}
    if(e.code==='ShiftLeft'||e.code==='ShiftRight'){e.preventDefault();inp.slow=true;$('bs').classList.add('on');}
    if(e.code==='Escape'||e.code==='KeyP')pauseGame();
  });
  document.addEventListener('keyup',G._ku=e=>{
    if(KM[e.code])inp[KM[e.code]]=false;
    if(e.code==='ShiftLeft'||e.code==='ShiftRight'){inp.slow=false;$('bs').classList.remove('on');}
  });
  refreshBombUI();
}

function removeInput(){
  _th.forEach(({el,ev,fn})=>el.removeEventListener(ev,fn));_th.length=0;
  if(G._kd){document.removeEventListener('keydown',G._kd);G._kd=null;}
  if(G._ku){document.removeEventListener('keyup',G._ku);G._ku=null;}
  inp.slow=false;inp.up=inp.down=inp.left=inp.right=false;
  $('bs').classList.remove('on');
  document.querySelectorAll('.dbtn').forEach(el=>el.classList.remove('active'));
}

function pauseGame(){if(G.state!=='play')return;G.state='pause';show('o-pause');refreshSysBar();}
function resumeGame(){hide('o-pause');G.state='countdown';refreshSysBar();startCountdown(()=>{G.state='play';refreshSysBar();});}

let _raf=null;
function loop(){if(G.state==='dead'){_raf=null;return;}update();draw();_raf=requestAnimationFrame(loop);}
function teardown(){if(_raf){cancelAnimationFrame(_raf);_raf=null;}removeInput();}

function gameStart(){
  Sfx.init();resetG();placePlayer();setupInput();
  G.state='countdown';refreshSysBar();
  if(!_raf)loop();
  startCountdown(()=>{G.state='play';showBanner('STAGE 1');G.formF=80;refreshSysBar();});
}

function applySetUI(){$('d-diff').value=cfg.difficulty;$('d-snd').checked=cfg.sound;$('d-pop').checked=cfg.scorePop;$('d-shk').checked=cfg.shake;}
function refreshSfxBtn(){$('ss').textContent=cfg.sound?'♪':'♩';Sfx.on=cfg.sound;}

function renderHS(){
  const el=$('hs-list');
  if(!hs.length){el.innerHTML='<div class="pr" style="justify-content:center;color:rgba(255,255,255,.18);font-size:.56rem;letter-spacing:.2em">NO RECORDS</div>';return;}
  el.innerHTML=hs.map((s,i)=>`<div class="pr"><span class="k">${i+1}.  ST.${s.stage}</span><span class="v">${s.score.toLocaleString()}</span></div>`).join('');
}

let cfg=Store.loadCfg();
let hs=Store.loadHS();

window.addEventListener('load',()=>{
  resize();let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(resize,80);});
  applySetUI();refreshSfxBtn();
  const au=()=>{Sfx.init();};
  document.addEventListener('touchstart',au,{once:true});document.addEventListener('click',au,{once:true});
  $('b-start').onclick=()=>{hide('o-start');gameStart();};
  $('b-hs').onclick=()=>{renderHS();hide('o-start');show('o-hs');};
  $('b-set').onclick=()=>{hide('o-start');show('o-set');};
  $('b-set-ok').onclick=()=>{cfg.difficulty=$('d-diff').value;cfg.sound=$('d-snd').checked;cfg.scorePop=$('d-pop').checked;cfg.shake=$('d-shk').checked;Store.saveCfg(cfg);refreshSfxBtn();hide('o-set');show('o-start');};
  $('b-set-no').onclick=()=>{applySetUI();hide('o-set');show('o-start');};
  $('b-hs-back').onclick=()=>{hide('o-hs');show('o-start');};
  $('b-hs-clr').onclick=()=>{if(confirm('ハイスコアを削除しますか？')){Store.clearHS();hs=[];renderHS();}};
  const pH=e=>{e.preventDefault();pauseGame();};
  $('sp').addEventListener('click',pH);$('sp').addEventListener('touchstart',pH,{passive:false});
  $('b-resume').onclick=resumeGame;
  const fH=e=>{e.preventDefault();const el=document.documentElement;(document.fullscreenElement?document.exitFullscreen():el.requestFullscreen?.()).catch(()=>{});};
  $('sf').addEventListener('click',fH);$('sf').addEventListener('touchstart',fH,{passive:false});
  const sH=e=>{if(e.type==='touchstart')e.preventDefault();cfg.sound=!cfg.sound;Store.saveCfg(cfg);refreshSfxBtn();};
  $('ss').addEventListener('click',sH);$('ss').addEventListener('touchstart',sH,{passive:false});
  try{screen.orientation?.lock?.('portrait').catch(()=>{});}catch{}
  refreshSysBar();
  (function idle(){if(G.state!=='menu')return;tickStars();draw();requestAnimationFrame(idle);})();
});
</script>

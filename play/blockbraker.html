<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BREAKOUT</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #00d4ff;
      --accent2: #ff006e;
      --accent3: #adff2f;
      --text: #e0e0ff;
      --text-dim: #5a5a7a;
      --paddle: #00d4ff;
      --ball: #ffffff;
      --glow: rgba(0,212,255,0.3);
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      font-family: 'Orbitron', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 12px;
      gap: 10px;
    }

    #hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 520px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      position: relative;
    }
    #hud::before {
      content: '';
      position: absolute;
      inset: 0;
      border-top: 2px solid var(--accent);
      pointer-events: none;
    }

    .hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .hud-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .hud-value {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent);
      min-width: 60px;
      text-align: center;
    }
    #livesDisplay {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .life-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent2);
      box-shadow: 0 0 6px var(--accent2);
      transition: all 0.3s;
    }
    .life-dot.empty {
      background: var(--border);
      box-shadow: none;
    }

    #multiBadge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--accent3);
      text-shadow: 0 0 8px var(--accent3);
      opacity: 0;
      transition: opacity 0.3s;
      letter-spacing: 0.1em;
    }
    #multiBadge.visible { opacity: 1; }

    #canvasWrap {
      position: relative;
      width: 100%;
      max-width: 520px;
    }
    #canvasWrap::before, #canvasWrap::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: var(--accent);
      border-style: solid;
      z-index: 2;
    }
    #canvasWrap::before {
      top: -2px; left: -2px;
      border-width: 2px 0 0 2px;
    }
    #canvasWrap::after {
      bottom: -2px; right: -2px;
      border-width: 0 2px 2px 0;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid var(--border);
      background: var(--bg);
    }

    #mobileControls {
      display: none;
      width: 100%;
      max-width: 520px;
      gap: 10px;
    }
    .ctrl-btn {
      flex: 1;
      height: 64px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      color: var(--accent);
      font-size: 26px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      touch-action: manipulation;
      position: relative;
      overflow: hidden;
      transition: background 0.1s;
    }
    .ctrl-btn:active {
      background: rgba(0,212,255,0.1);
    }
    .ctrl-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,212,255,0.15) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.1s;
    }
    .ctrl-btn:active::after { opacity: 1; }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
      backdrop-filter: blur(4px);
    }
    #overlayBox {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      padding: 40px 36px;
      text-align: center;
      max-width: min(92vw, 380px);
      position: relative;
    }
    #overlayBox::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent2), transparent);
    }
    #overlayTitle {
      font-size: clamp(22px, 6vw, 32px);
      font-weight: 900;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent);
      margin-bottom: 16px;
    }
    #overlayTitle.clear {
      color: var(--accent3);
      text-shadow: 0 0 20px var(--accent3);
    }
    #overlayTitle.over {
      color: var(--accent2);
      text-shadow: 0 0 20px var(--accent2);
    }
    #overlayMsg {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 28px;
      line-height: 1.8;
      letter-spacing: 0.05em;
    }
    #overlayMsg strong {
      color: var(--text);
    }
    #restartBtn {
      padding: 14px 40px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      cursor: pointer;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      transition: all 0.2s;
    }
    #restartBtn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: translateX(-100%);
      transition: transform 0.2s;
      z-index: -1;
    }
    #restartBtn:hover::before { transform: translateX(0); }
    #restartBtn:hover { color: var(--bg); }

    #levelTag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.2em;
      text-align: center;
      margin-top: -4px;
    }

    .score-pop {
      position: absolute;
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent3);
      text-shadow: 0 0 8px var(--accent3);
      pointer-events: none;
      animation: popUp 0.8s ease-out forwards;
      z-index: 10;
    }
    @keyframes popUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-40px) scale(1.3); }
    }

    @media (hover: none) and (pointer: coarse) {
      #mobileControls { display: flex; }
    }
    @media (max-width: 540px) {
      #mobileControls { display: flex; }
      #app { gap: 8px; padding: 10px; }
      .hud-value { font-size: 17px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="hud-item">
      <div class="hud-label">SCORE</div>
      <div class="hud-value" id="scoreVal">0</div>
    </div>
    <div class="hud-item">
      <div id="multiBadge">×2 COMBO!</div>
      <div id="levelTag">LEVEL 1</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">LIVES</div>
      <div id="livesDisplay"></div>
    </div>
  </div>

  <div id="canvasWrap">
    <canvas id="gc"></canvas>
  </div>

  <div id="mobileControls">
    <button class="ctrl-btn" id="leftBtn">◀</button>
    <button class="ctrl-btn" id="rightBtn">▶</button>
  </div>
</div>

<div id="overlay">
  <div id="overlayBox">
    <div id="overlayTitle">BREAKOUT</div>
    <div id="overlayMsg">
      <strong>DESKTOP</strong>: マウスで操作 / 矢印キー<br>
      <strong>MOBILE</strong>: タッチでパドル移動<br><br>
      ブロックを全て壊すとクリア<br>
      コンボで得点アップ
    </div>
    <button id="restartBtn">START</button>
  </div>
</div>

<script>
const W = 500, H = 680;
const COLS = 8, ROWS = 6;
const PAD_H = 12, PAD_W_BASE = 90;
const BALL_R_BASE = 8;
const MAX_LIVES = 3;
const LEVELS = [
  { speed: 4.2, label: 'LEVEL 1' },
  { speed: 5.0, label: 'LEVEL 2' },
  { speed: 5.9, label: 'LEVEL 3' },
  { speed: 6.8, label: 'LEVEL 4' },
];

const ROW_COLORS = [
  '#ff006e','#ff4d6d','#ff7c43','#ffd60a',
  '#80ffdb','#00d4ff','#7b2fff',
];

const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
let scale = 1, pr = 1;
let state = 'idle'; // idle | playing | dead | clear
let score, lives, level, combo, comboTimer;
let ballX, ballY, ballDX, ballDY, ballR, ballTrail;
let padX, padW, padH;
let blocks;
let particles;
let ripples;
let raf;
let keyLeft = false, keyRight = false;
let lastTime = 0;
let pulseClock = 0;

function setupCanvas() {
  const wrap = document.getElementById('canvasWrap');
  const cw = wrap.clientWidth;
  scale = cw / W;
  pr = window.devicePixelRatio || 1;
  canvas.width  = W * pr;
  canvas.height = H * pr;
  canvas.style.width  = cw + 'px';
  canvas.style.height = (H * scale) + 'px';
  ctx.setTransform(pr, 0, 0, pr, 0, 0);
}

function initGame(lv = 0) {
  level = lv;
  score = 0;
  lives = MAX_LIVES;
  combo = 0;
  comboTimer = 0;
  particles = [];
  ripples = [];
  ballTrail = [];
  padW = PAD_W_BASE;
  padH = PAD_H;
  padX = (W - padW) / 2;
  ballR = BALL_R_BASE;
  resetBall();
  buildBlocks();
  updateHUD();
}

function resetBall() {
  const sp = LEVELS[level].speed;
  ballX = W / 2;
  ballY = H - 120;
  const ang = -Math.PI / 2 + (Math.random() - 0.5) * 0.8;
  ballDX = Math.cos(ang) * sp;
  ballDY = Math.sin(ang) * sp;
  ballTrail = [];
}

function buildBlocks() {
  const bPad = 8;
  const bW = (W - bPad * (COLS + 1)) / COLS;
  const bH = 26;
  const topOff = 60;
  blocks = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      blocks.push({
        x: bPad + c * (bW + bPad),
        y: topOff + r * (bH + bPad),
        w: bW, h: bH,
        color: ROW_COLORS[r % ROW_COLORS.length],
        hp: (r < 2) ? 2 : 1,
        alive: true,
        flash: 0,
      });
    }
  }
}

function updateHUD() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('levelTag').textContent = LEVELS[level].label;
  const ld = document.getElementById('livesDisplay');
  ld.innerHTML = '';
  for (let i = 0; i < MAX_LIVES; i++) {
    const d = document.createElement('div');
    d.className = 'life-dot' + (i >= lives ? ' empty' : '');
    ld.appendChild(d);
  }
}

function updateComboUI() {
  const badge = document.getElementById('multiBadge');
  if (combo >= 2) {
    badge.textContent = `×${combo} COMBO!`;
    badge.className = 'visible';
  } else {
    badge.className = '';
  }
}

function spawnParticles(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 1.5 + Math.random() * 3.5;
    particles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      life: 1,
      decay: 0.025 + Math.random() * 0.03,
      r: 2 + Math.random() * 3,
      color,
    });
  }
}

function spawnRipple(x, y, color) {
  ripples.push({ x, y, r: 4, maxR: 40, life: 1, color });
}

function scorePopup(x, y, pts) {
  const wrap = document.getElementById('canvasWrap');
  const el = document.createElement('div');
  el.className = 'score-pop';
  el.textContent = '+' + pts;
  const rx = (x / W) * wrap.clientWidth;
  const ry = (y / H) * parseFloat(canvas.style.height);
  el.style.left = rx + 'px';
  el.style.top  = ry + 'px';
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

function collide() {

  if (ballX - ballR < 0)  { ballX = ballR; ballDX = Math.abs(ballDX); }
  if (ballX + ballR > W)  { ballX = W - ballR; ballDX = -Math.abs(ballDX); }
  if (ballY - ballR < 0)  { ballY = ballR; ballDY = Math.abs(ballDY); }

  if (ballY + ballR >= H - padH - 6 && ballY + ballR < H - padH + 12) {
    if (ballX > padX - 2 && ballX < padX + padW + 2) {
      ballDY = -Math.abs(ballDY);

      const rel = (ballX - (padX + padW / 2)) / (padW / 2);
      ballDX = rel * LEVELS[level].speed * 1.1;
      const spd = Math.sqrt(ballDX * ballDX + ballDY * ballDY);
      const norm = LEVELS[level].speed / spd;
      ballDX *= norm; ballDY *= norm;
      ballY = H - padH - 6 - ballR;
      combo = 0;
      updateComboUI();
      spawnRipple(ballX, H - padH, '#00d4ff');
    }
  }

  if (ballY - ballR > H) {
    lives--;
    updateHUD();
    if (lives <= 0) {
      endGame(false);
    } else {
      resetBall();
    }
    return;
  }

  for (const b of blocks) {
    if (!b.alive) continue;
    if (ballX + ballR < b.x || ballX - ballR > b.x + b.w) continue;
    if (ballY + ballR < b.y || ballY - ballR > b.y + b.h) continue;

    b.hp--;
    b.flash = 8;

    const overlapL = ballX + ballR - b.x;
    const overlapR = b.x + b.w - (ballX - ballR);
    const overlapT = ballY + ballR - b.y;
    const overlapB = b.y + b.h - (ballY - ballR);
    const minH = Math.min(overlapL, overlapR);
    const minV = Math.min(overlapT, overlapB);
    if (minH < minV) ballDX = -ballDX;
    else              ballDY = -ballDY;

    if (b.hp <= 0) {
      b.alive = false;
      combo++;
      comboTimer = 120;
      const pts = 10 * combo;
      score += pts;
      scorePopup(b.x + b.w / 2, b.y, pts);
      spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color, 12);
      spawnRipple(b.x + b.w / 2, b.y + b.h / 2, b.color);
    } else {
      spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color, 4);
    }

    updateHUD();
    updateComboUI();

    const alive = blocks.filter(x => x.alive).length;
    if (alive === 0) {
      endGame(true);
      return;
    }
    break;
  }
}

function drawBlocks() {
  for (const b of blocks) {
    if (!b.alive) continue;
    const alpha = b.flash > 0 ? 1 : 0.92;
    const glow  = b.flash > 0 ? b.color : 'transparent';

    ctx.save();
    if (b.flash > 0) {
      ctx.shadowBlur  = 18;
      ctx.shadowColor = b.color;
    }

    ctx.globalAlpha = alpha;
    ctx.fillStyle = b.flash > 0 ? '#ffffff' : b.color;
    ctx.fillRect(b.x, b.y, b.w, b.h);

    if (b.flash === 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillRect(b.x, b.y, b.w, 4);
    }

    if (b.hp === 2) {
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 2;
      ctx.strokeRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2);
    }

    ctx.restore();
    if (b.flash > 0) b.flash--;
  }
}

function drawBall() {
  // trail
  for (let i = 0; i < ballTrail.length; i++) {
    const t = ballTrail[i];
    const a = (i / ballTrail.length) * 0.3;
    ctx.beginPath();
    ctx.arc(t.x, t.y, ballR * (i / ballTrail.length) * 0.7, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,212,255,${a})`;
    ctx.fill();
  }

  ctx.save();
  ctx.shadowBlur  = 16;
  ctx.shadowColor = '#00d4ff';
  ctx.beginPath();
  ctx.arc(ballX, ballY, ballR, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  const g = ctx.createRadialGradient(ballX - 2, ballY - 2, 0, ballX, ballY, ballR);
  g.addColorStop(0, 'rgba(255,255,255,0.9)');
  g.addColorStop(1, 'rgba(0,212,255,0.2)');
  ctx.fillStyle = g;
  ctx.fill();
  ctx.restore();
}

function drawPaddle() {
  ctx.save();
  ctx.shadowBlur  = 20;
  ctx.shadowColor = '#00d4ff';
  const py = H - padH;

  ctx.fillStyle = '#00d4ff';
  ctx.fillRect(padX, py, padW, padH);

  const gp = ctx.createLinearGradient(padX, py, padX, py + padH);
  gp.addColorStop(0, 'rgba(255,255,255,0.3)');
  gp.addColorStop(1, 'rgba(0,0,0,0.1)');
  ctx.fillStyle = gp;
  ctx.fillRect(padX, py, padW, padH);

  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.fill();
    ctx.globalAlpha = 1;
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.08; // gravity
    p.life -= p.decay;
  }
  particles = particles.filter(p => p.life > 0);
}

function drawRipples() {
  for (const rp of ripples) {
    ctx.beginPath();
    ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
    ctx.strokeStyle = rp.color;
    ctx.globalAlpha = rp.life * 0.6;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.globalAlpha = 1;
    rp.r += (rp.maxR - rp.r) * 0.15;
    rp.life -= 0.045;
  }
  ripples = ripples.filter(r => r.life > 0);
}

function drawBg() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = 'rgba(255,0,110,0.04)';
  ctx.fillRect(0, H - PAD_H - 30, W, 30);
}

function loop(ts) {
  if (state !== 'playing') return;
  raf = requestAnimationFrame(loop);

  const dt = Math.min(ts - lastTime, 32);
  lastTime = ts;
  pulseClock += dt;

  ballTrail.push({ x: ballX, y: ballY });
  if (ballTrail.length > 10) ballTrail.shift();

  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer === 0) {
      combo = 0;
      updateComboUI();
    }
  }

  const padSpd = 7;
  if (keyRight && padX + padW < W) padX = Math.min(padX + padSpd, W - padW);
  if (keyLeft  && padX > 0)        padX = Math.max(padX - padSpd, 0);

  ballX += ballDX;
  ballY += ballDY;
  collide();

  drawBg();
  drawRipples();
  drawBlocks();
  drawParticles();
  drawBall();
  drawPaddle();
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  state = 'playing';
  initGame(0);
  lastTime = performance.now();
  raf = requestAnimationFrame(loop);
}

function nextLevel() {
  const nl = Math.min(level + 1, LEVELS.length - 1);
  state = 'playing';
  document.getElementById('overlay').style.display = 'none';
  initGame(nl);
  lastTime = performance.now();
  raf = requestAnimationFrame(loop);
}

function endGame(cleared) {
  state = cleared ? 'clear' : 'dead';
  cancelAnimationFrame(raf);

  const title = document.getElementById('overlayTitle');
  const msg   = document.getElementById('overlayMsg');
  const btn   = document.getElementById('restartBtn');

  if (cleared) {
    const hasNext = level + 1 < LEVELS.length;
    title.textContent = 'CLEAR!';
    title.className   = 'clear';
    msg.innerHTML = `SCORE: <strong>${score}</strong><br>${hasNext ? '次のレベルへ挑戦！' : '全レベルクリア！ 素晴らしい！'}`;
    btn.textContent = hasNext ? 'NEXT LEVEL' : 'RESTART';
    btn.onclick = hasNext ? nextLevel : startGame;
  } else {
    title.textContent = 'GAME OVER';
    title.className   = 'over';
    msg.innerHTML = `SCORE: <strong>${score}</strong><br>もう一度挑戦`;
    btn.textContent = 'RETRY';
    btn.onclick = startGame;
  }

  document.getElementById('overlay').style.display = 'flex';
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'Right') { keyRight = true; e.preventDefault(); }
  if (e.key === 'ArrowLeft'  || e.key === 'Left')  { keyLeft  = true; e.preventDefault(); }
  if (e.key === ' ') e.preventDefault();
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowRight' || e.key === 'Right') keyRight = false;
  if (e.key === 'ArrowLeft'  || e.key === 'Left')  keyLeft  = false;
});

canvas.addEventListener('mousemove', e => {
  if (state !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width * W;
  padX = Math.max(0, Math.min(W - padW, x - padW / 2));
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.touches[0].clientX - rect.left) / rect.width * W;
  padX = Math.max(0, Math.min(W - padW, x - padW / 2));
}, { passive: false });

const lb = document.getElementById('leftBtn');
const rb = document.getElementById('rightBtn');
const setBtn = (el, dir) => {
  const on  = () => { if (dir === 'l') keyLeft  = true; else keyRight = true; };
  const off = () => { if (dir === 'l') keyLeft  = false; else keyRight = false; };
  el.addEventListener('touchstart', e => { e.preventDefault(); on(); },  { passive: false });
  el.addEventListener('touchend',   e => { e.preventDefault(); off(); }, { passive: false });
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup',   off);
  el.addEventListener('mouseleave',off);
};
setBtn(lb, 'l');
setBtn(rb, 'r');

function onResize() {
  const wasPlaying = state === 'playing';
  if (wasPlaying) cancelAnimationFrame(raf);
  setupCanvas();
  if (wasPlaying) {
    lastTime = performance.now();
    raf = requestAnimationFrame(loop);
  }
}
window.addEventListener('resize', onResize);

setupCanvas();

document.getElementById('restartBtn').onclick = startGame;

(function idleBg() {
  if (state !== 'idle') return;
  drawBg();
  requestAnimationFrame(idleBg);
})();
</script>
</body>
</html>
